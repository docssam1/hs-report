<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>지필드 영재교육 | 모의고사 뷰어·오답 분석</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root{--navy:#1e3c72;--navy2:#2a5298;--orange:#f97316;--orange2:#ea580c;--bg:#eef1f6;--card:#fff;--line:#dfe5ed;--ink:#27313f;--muted:#697586;--ok:#159957;--bad:#dc2626}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Pretendard,'Noto Sans KR',sans-serif}.hidden{display:none!important}button,a{font:inherit}.gate{position:fixed;inset:0;z-index:30;background:linear-gradient(135deg,#10203f,#294b88);display:flex;align-items:center;justify-content:center;padding:20px}.gatebox{width:min(390px,100%);padding:34px 28px;border-radius:22px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;text-align:center;backdrop-filter:blur(12px)}.gatebox h1{font-size:22px;margin:0 0 8px}.gatebox p{font-size:13px;line-height:1.6;opacity:.8}.gatebox input{width:100%;padding:14px;border:0;border-radius:11px;text-align:center;font-size:16px;margin:12px 0}.btn{border:0;border-radius:10px;padding:11px 14px;font-weight:800;cursor:pointer}.btn.pri{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff}.btn.navy{background:var(--navy);color:#fff}.btn.gray{background:#eef1f6;color:#354052}.btn.bad{background:#fee2e2;color:#b91c1c}.btn:disabled{opacity:.45;cursor:not-allowed}.gatebox .btn{width:100%}.err{min-height:20px;color:#ffe1bc;font-size:12px;margin-top:8px}header{position:sticky;top:0;z-index:15;background:var(--navy);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}header b{font-size:16px}header small{display:block;opacity:.7;margin-top:2px}header a,header button{color:#fff;background:rgba(255,255,255,.14);border:0;border-radius:8px;padding:8px 10px;text-decoration:none;cursor:pointer}.wrap{max-width:1050px;margin:auto;padding:16px 14px 90px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 3px 12px rgba(30,45,65,.05)}h2,h3{margin:0 0 10px}.hint{font-size:13px;color:var(--muted);line-height:1.65}.rounds{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;margin-top:12px}.round{padding:15px 10px;border:1px solid var(--line);border-radius:13px;background:#fff;text-align:center;cursor:pointer}.round:hover{border-color:#f9b47c}.round .n{font-size:18px;font-weight:900;color:var(--orange2)}.round .s{font-size:11px;color:var(--muted);margin-top:4px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.toolbar .sp{flex:1}.viewer{display:grid;grid-template-columns:1.25fr .75fr;gap:14px}.pages{max-height:72vh;overflow:auto;background:#dfe5ed;border-radius:13px;padding:10px}.page{position:relative;margin:0 auto 10px;background:#fff;max-width:760px}.page img{display:block;width:100%;user-select:none}.wm{position:absolute;inset:0;display:grid;grid-template-columns:repeat(3,1fr);align-items:center;pointer-events:none;overflow:hidden}.wm span{transform:rotate(-25deg);color:rgba(30,60,114,.12);font-weight:900;text-align:center;font-size:16px}.side{min-width:0}.qgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin:12px 0}.q{aspect-ratio:1;border:1.5px solid var(--line);border-radius:9px;background:#fff;font-weight:900;cursor:pointer}.q.x{background:#fee2e2;color:var(--bad);border-color:#f4a6a6}.score{display:flex;gap:14px;align-items:end;padding:12px;background:#fff7ed;border:1px solid #fed7aa;border-radius:12px}.score strong{font-size:34px;color:var(--orange2)}.analysis .row{margin:9px 0}.bar{height:9px;background:#edf1f5;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,#fb923c,#ea580c)}.wrong{border:1px solid #fee2e2;border-radius:10px;padding:9px 11px;margin:7px 0;background:#fff8f8;font-size:13px}.admin-table{overflow:auto}.admin-table table{border-collapse:collapse;width:100%;min-width:760px}.admin-table th,.admin-table td{border:1px solid var(--line);padding:7px;text-align:center;font-size:12px}.admin-table th{background:#f4f6f9}.select{padding:10px;border:1px solid var(--line);border-radius:9px}.toast{position:fixed;left:50%;bottom:25px;transform:translateX(-50%);background:#182235;color:#fff;padding:10px 17px;border-radius:999px;opacity:0;pointer-events:none;transition:.2s;z-index:50}.toast.show{opacity:1}@media(max-width:780px){.viewer{grid-template-columns:1fr}.pages{max-height:58vh}.qgrid{grid-template-columns:repeat(10,1fr)}}@media(max-width:520px){.qgrid{grid-template-columns:repeat(6,1fr)}}
</style>
</head>
<body>
<div id="gate" class="gate"><div class="gatebox"><h1>모의고사 뷰어·오답 분석</h1><p>학생 이름을 입력하세요.<br>원장 모드는 <b>docssam</b>으로 입장합니다.</p><input id="pw" placeholder="학생 이름" autocomplete="off"><button class="btn pri" onclick="enter()">입장하기</button><div class="err" id="err"></div></div></div>
<div id="app" class="hidden"><header><div><b id="headTitle">모의고사</b><small id="headSub">지필드 영재교육</small></div><div><a href="index.html">← 아카이브</a> <button onclick="logout()">나가기</button></div></header><main class="wrap" id="main"></main></div>
<div class="toast" id="toast"></div>
<script>document.write('<script src="data.js?v='+Date.now()+'"><\/script>');</script>
<script src="mock-data.js"></script><script src="mock-data-hw.js"></script><script src="mock-rx.js"></script>
<script>
const P=new URLSearchParams(location.search),SET=(P.get('set')||'').toLowerCase()==='hw'?'hw':'mid';
const SETNAME=SET==='hw'?'활용':'중급',D=window.GFIELD_DATA||{},M=SET==='hw'?(window.GFIELD_MOCK_HW||{}):(window.GFIELD_MOCK||{});
const SUPA_URL='https://fgahqumaldheqettmvqg.supabase.co',SUPA_KEY='sb_publishable_OsjJG92BLMaZrc2jTClt0g_ecdTtf_I';
M.results=M.results||{};let me='',mode='parent',cur='',ox=[];
function esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(s){const e=document.getElementById('toast');e.textContent=s;e.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>e.classList.remove('show'),2200)}
function rkey(r){return (SET==='hw'?'hw':'')+r} function unkey(r){r=String(r);return SET==='hw'?(r.startsWith('hw')?r.slice(2):null):(r.startsWith('hw')?null:r)}
function allRounds(){return Object.keys(M.rounds||{}).sort((a,b)=>+a-+b)}
function allowedRounds(student){const all=allRounds();if(SET!=='hw'||mode==='teacher')return all;if(!student)return[];if((((D.archiveAccess||{})['활용 모의고사'])||[]).includes(student))return all;const tbs=((D.content||{})['special-summer']||{}).textbooks||[],a=[];tbs.forEach(t=>{const m=String(t.title||'').match(/활용\s*모의고사\s*(\d+)\s*회/);if(m&&Array.isArray(t.access)&&t.access.includes(student))a.push(String(+m[1]))});return[...new Set(a)].filter(r=>(M.rounds||{})[r]).sort((a,b)=>+a-+b)}
function canRound(r){return allowedRounds(me).includes(String(r))}
function lsKey(){return'gfield_mock_'+SET+'_'+me} function attempts(){try{return JSON.parse(localStorage.getItem(lsKey())||'{}')}catch(e){return{}}} function saveAttempts(x){localStorage.setItem(lsKey(),JSON.stringify(x))}
function questions(){return M.questions||30} function items(r){return ((M.rounds||{})[r]||{}).items||[]} function item(r,n){return items(r).find(x=>+x.no===+n)||{no:n,type:'',answer:''}}
function points(n){if(M.blueprint){const b=M.blueprint.find(x=>+x.no===+n);if(b&&b.pts!=null)return+b.pts}return n<=12?2.7:n<=22?3.4:4.2}
function area(n){const b=(M.blueprint||[]).find(x=>+x.no===+n);return b?b.area:'기타'}
function calc(a){let score=0,wrong=0;for(let n=1;n<=questions();n++){if(a[n-1]==='X')wrong++;else score+=points(n)}return{score:Math.round(score*10)/10,wrong}}
function bookFor(r){return(D.books||[]).find(b=>b.folder==='활용 모의고사'&&new RegExp('활용\\s*모의고사\\s*'+r+'\\s*회').test(b.title||''))}
async function loadServerStudent(){try{const u=SUPA_URL+'/rest/v1/mock_results?select=round,ox,source,updated_at&student=eq.'+encodeURIComponent(me),res=await fetch(u,{headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}});if(!res.ok)return;const rows=await res.json(),a=attempts();allowedRounds(me).forEach(r=>delete a[r]);rows.forEach(x=>{const r=unkey(x.round);if(r&&canRound(r)&&x.ox&&x.ox.length===questions())a[r]=[{ox:x.ox,at:x.updated_at||'',by:x.source||'db'}]});saveAttempts(a)}catch(e){}}
async function upsert(r,a,source){const c=calc(a);const res=await fetch(SUPA_URL+'/rest/v1/mock_results',{method:'POST',headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates'},body:JSON.stringify({student:me,round:rkey(r),ox:a.join(''),score:c.score,wrong:c.wrong,source:source||'parent'})});return res.ok}
function enter(){const v=document.getElementById('pw').value.trim();if(!v)return;if(v.toLowerCase()==='docssam'){me='원장';mode='teacher';openApp();renderTeacher();return}if(!(D.students||[]).includes(v)){document.getElementById('err').textContent='등록된 학생 이름을 정확히 입력해 주세요.';return}me=v;mode='parent';localStorage.setItem('gfield_student',v);openApp();startParent()}
function openApp(){document.getElementById('gate').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('headTitle').textContent=SETNAME+' 모의고사 뷰어·오답 분석';document.getElementById('headSub').textContent=mode==='teacher'?'원장 관리 모드':me+' 학생'}
function logout(){localStorage.removeItem('gfield_student');location.href='mock.html'+(SET==='hw'?'?set=hw':'')}
async function startParent(){await loadServerStudent();const rd=P.get('round');if(rd&&canRound(rd))openRound(rd);else renderRounds()}
function renderRounds(){const rs=allowedRounds(me);let h='<div class="card"><h2>📝 '+SETNAME+' 모의고사</h2><div class="hint">열람 승인된 회차만 표시됩니다. 시험지를 보고 푼 뒤 틀린 번호를 체크하면 점수와 약점 분석이 저장됩니다.</div><div class="rounds">';if(!rs.length)h+='<div class="hint">현재 승인된 회차가 없습니다.</div>';rs.forEach(r=>{const a=attempts()[r]||[],last=a[a.length-1],sc=last?calc(String(last.ox).split('')):null;h+='<button class="round" onclick="openRound(\''+r+'\')"><div class="n">'+esc(((M.rounds||{})[r]||{}).title||r+'회')+'</div><div class="s">'+(sc?'최근 '+sc.score+'점 · 제출 '+a.length+'/3':'미응시 · 최대 3회')+'</div></button>'});h+='</div></div>';document.getElementById('main').innerHTML=h}
function openRound(r){r=String(r);if(!canRound(r)){toast('이 회차는 아직 승인되지 않았습니다.');return renderRounds()}cur=r;const a=attempts()[r]||[],last=a[a.length-1];ox=last?String(last.ox).split(''):Array(questions()).fill('O');const b=bookFor(r),title=esc(((M.rounds||{})[r]||{}).title||r+'회');let pages='';if(b&&b.imgdir&&b.pages){for(let i=1;i<=b.pages;i++){let w='';for(let k=0;k<9;k++)w+='<span>'+esc(me)+' · 지필드</span>';pages+='<div class="page"><img draggable="false" src="materials/'+esc(b.imgdir)+'/'+String(i).padStart(3,'0')+'.jpg"><div class="wm">'+w+'</div></div>'}}else pages='<div class="card hint">시험지 이미지가 등록되지 않았습니다.</div>';document.getElementById('main').innerHTML='<div class="toolbar card"><button class="btn gray" onclick="renderRounds()">‹ 회차 목록</button><b>'+title+'</b><span class="sp"></span>'+(b&&b.video?'<a class="btn navy" target="_blank" rel="noopener" href="'+esc(b.video)+'">▶ 풀이 영상</a>':'')+'<a class="btn gray" target="_blank" href="answer.html?set='+SET+'&round='+r+'">답안·교재표</a></div><div class="viewer"><div class="pages">'+pages+'</div><div class="side"><div class="card"><h3>틀린 문제만 선택하세요</h3><div class="hint">빨간색 ✕가 오답입니다. 제출은 회차별 최대 3번 가능합니다.</div><div class="qgrid" id="qgrid"></div><div id="score"></div><button class="btn pri" style="width:100%;margin-top:12px" onclick="submitResult()">오답 제출·분석</button></div><div id="analysis"></div></div></div>';drawQ();drawAnalysis()}
function drawQ(){const g=document.getElementById('qgrid');if(!g)return;g.innerHTML='';for(let n=1;n<=questions();n++){const b=document.createElement('button');b.className='q '+(ox[n-1]==='X'?'x':'');b.textContent=ox[n-1]==='X'?'✕':n;b.onclick=()=>{ox[n-1]=ox[n-1]==='X'?'O':'X';drawQ();drawAnalysis()};g.appendChild(b)}}
function drawAnalysis(){const c=calc(ox),e=document.getElementById('score');if(e)e.innerHTML='<div class="score"><strong>'+c.score+'</strong><span>점<br><b>오답 '+c.wrong+'문항</b></span></div>';const box=document.getElementById('analysis');if(!box)return;const agg={},wr=[];for(let n=1;n<=questions();n++){const ar=area(n);agg[ar]=agg[ar]||{tot:0,ok:0};agg[ar].tot++;if(ox[n-1]!=='X')agg[ar].ok++;else wr.push(item(cur,n))}let h='<div class="card analysis"><h3>영역별 분석</h3>';Object.entries(agg).forEach(([k,v])=>{const p=Math.round(v.ok/v.tot*100);h+='<div class="row"><div>'+esc(k)+' <b style="float:right">'+p+'%</b></div><div class="bar"><i style="width:'+p+'%"></i></div></div>'});if(wr.length){h+='<h3 style="margin-top:16px">오답 유형</h3>';wr.forEach(w=>h+='<div class="wrong"><b>'+w.no+'번</b> '+esc(w.type||'유형 확인 필요')+'</div>')}h+='</div>';box.innerHTML=h}
async function submitResult(){const a=attempts(),list=a[cur]||[];if(list.length>=3){toast('이 회차는 3회 채점을 모두 사용했습니다. 원장님께 초기화를 요청하세요.');return}const ok=await upsert(cur,ox,'parent');if(!ok){toast('저장에 실패했습니다. 다시 시도해 주세요.');return}list.push({ox:ox.join(''),at:new Date().toISOString(),by:'parent'});a[cur]=list;saveAttempts(a);toast('저장되었습니다. '+list.length+'/3회');drawAnalysis()}
async function loadAll(){M.results={};try{const res=await fetch(SUPA_URL+'/rest/v1/mock_results?select=student,round,ox,source,updated_at',{headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}}),rows=await res.json();rows.forEach(x=>{const r=unkey(x.round);if(!r||!x.ox||x.ox.length!==questions())return;M.results[x.student]=M.results[x.student]||{};M.results[x.student][r]=x})}catch(e){}}
async function renderTeacher(){await loadAll();const students=D.students||[];let sel=window.tsel||students[0]||'';window.tsel=sel;let h='<div class="card"><div class="toolbar"><h2>원장 모드 · '+SETNAME+'</h2><span class="sp"></span><select class="select" onchange="window.tsel=this.value;renderTeacher()">'+students.map(s=>'<option '+(s===sel?'selected':'')+'>'+esc(s)+'</option>').join('')+'</select></div><div class="hint">학생별 회차 기록을 확인하고, 원장 확인으로 생긴 기록이나 재응시가 필요한 회차를 초기화할 수 있습니다.</div></div><div class="card admin-table"><table><thead><tr><th>회차</th><th>점수</th><th>오답</th><th>저장 주체</th><th>초기화</th></tr></thead><tbody>';allRounds().forEach(r=>{const x=((M.results[sel]||{})[r]),c=x?calc(String(x.ox).split('')):null;h+='<tr><td>'+esc(((M.rounds||{})[r]||{}).title||r+'회')+'</td><td>'+(c?c.score:'-')+'</td><td>'+(c?c.wrong:'-')+'</td><td>'+(x?esc(x.source||''):'-')+'</td><td><button class="btn bad" '+(x?'':'disabled')+' onclick="resetRound(\''+esc(sel)+'\',\''+r+'\')">초기화</button></td></tr>'});h+='</tbody></table></div>';document.getElementById('main').innerHTML=h}
async function resetRound(student,r){if(!confirm(student+' 학생의 '+(((M.rounds||{})[r]||{}).title||r+'회')+' 기록을 초기화할까요?'))return;try{const u=SUPA_URL+'/rest/v1/mock_results?student=eq.'+encodeURIComponent(student)+'&round=eq.'+encodeURIComponent(rkey(r)),res=await fetch(u,{method:'DELETE',headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,Prefer:'return=minimal'}});if(!res.ok)throw 0;if(M.results[student])delete M.results[student][r];toast('초기화되었습니다. 학생이 다시 접속하면 재응시할 수 있습니다.');renderTeacher()}catch(e){toast('초기화에 실패했습니다.')}}
(function boot(){const n=(P.get('name')||localStorage.getItem('gfield_student')||'').trim();if(n&&n.toLowerCase()==='docssam'){me='원장';mode='teacher';openApp();renderTeacher()}else if(n&&(D.students||[]).includes(n)){me=n;mode='parent';localStorage.setItem('gfield_student',n);openApp();startParent()}document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')enter()})})();
</script>
</body></html>
