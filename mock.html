<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지필드 영재교육 | 중급 모의고사 진단</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
  :root{
    --navy:#1e3c72;--navy2:#2a5298;--orange:#f97316;--orange-d:#ea580c;
    --ink:#2d3436;--muted:#6b7280;--bg:#eef1f6;--card:#fff;--line:#e3e8ef;
    --ok:#27ae60;--danger:#e74c3c;--soft:#fff3e6;
    --t27:#3b82f6;--t34:#f97316;--t42:#dc2626;
    --t27bg:#eff6ff;--t34bg:#fff7ed;--t42bg:#fff1f1;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
  body{background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent;}
  button{cursor:pointer;font-family:inherit;}
  .hidden{display:none !important;}
  .wrap{max-width:960px;margin:0 auto;padding:16px 14px 100px;}

  /* 게이트 */
  #gate{position:fixed;inset:0;z-index:30;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#10203f,#26447f);padding:20px;}
  .gate-box{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);padding:40px 30px;border-radius:18px;width:100%;max-width:380px;text-align:center;color:#fff;}
  .gate-box h2{font-size:21px;font-weight:800;margin-bottom:4px;}
  .gate-box p{font-size:12.5px;opacity:.75;margin-bottom:22px;line-height:1.6;}
  .gate-box input{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;text-align:center;margin-bottom:12px;outline:none;}
  .gate-box button{width:100%;padding:14px;border:none;border-radius:10px;background:var(--orange);color:#fff;font-size:16px;font-weight:800;}
  .gate-box .err{color:#ffe0b8;font-size:12.5px;min-height:18px;margin-top:6px;line-height:1.5;}

  /* 헤더 */
  header{background:var(--navy);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20;}
  header .t{font-weight:800;font-size:16px;}
  header .t small{display:block;font-weight:500;opacity:.7;font-size:11px;}
  header a,header button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 12px;border-radius:8px;font-size:12.5px;font-weight:600;text-decoration:none;}

  /* 공통 카드/버튼 */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
  .card h3{font-size:15px;margin-bottom:8px;}
  .hint{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:10px;}
  .select{padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;}
  .btn{padding:11px 16px;border:none;border-radius:9px;font-weight:800;font-size:14px;}
  .btn.pri{background:linear-gradient(135deg,#fb923c,var(--orange-d));color:#fff;}
  .btn.navy{background:var(--navy);color:#fff;}
  .btn.gray{background:#eef1f6;color:#333;}
  .btn.ok{background:var(--ok);color:#fff;}
  .btn.sm{padding:7px 12px;font-size:12.5px;border-radius:8px;}

  /* 회차 선택 그리드 */
  .round-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
  .round-card{border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;cursor:pointer;background:#fff;}
  .round-card:hover{border-color:#fcd3a3;box-shadow:0 4px 12px rgba(186,110,40,.1);}
  .round-card .rn{font-size:17px;font-weight:800;color:var(--orange-d);}
  .round-card .rs{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .round-card .rcprint{margin-top:8px;font-size:11px;background:#eef1f6;border:none;border-radius:6px;padding:5px 8px;color:#334;font-weight:700;}

  /* 문항 그리드 */
  .qgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin:10px 0;}
  @media(max-width:560px){.qgrid{grid-template-columns:repeat(6,1fr);}}
  .qbtn{aspect-ratio:1;border:1.5px solid var(--line);border-radius:9px;background:#fff;font-size:14px;font-weight:800;color:#334;display:flex;align-items:center;justify-content:center;position:relative;user-select:none;}
  .qbtn.wrong{background:#fee2e2;border-color:#f6a6a6;color:#dc2626;}
  .qbtn.wrong::after{content:'✕';}
  .qbtn.wrong span{display:none;}

  /* 점수바 */
  .scorebar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--soft);border:1px solid #fcdcb8;border-radius:12px;padding:12px 14px;margin:8px 0;}
  .scorebar .big{font-size:26px;font-weight:900;color:var(--orange-d);}
  .scorebar .lbl{font-size:12px;color:var(--muted);}

  /* 영역별 바 */
  .area-row{margin:8px 0;}
  .area-row .at{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
  .area-row .at b{color:var(--ink);}
  .abar{height:9px;background:#eef1f6;border-radius:99px;overflow:hidden;}
  .abar i{display:block;height:100%;background:linear-gradient(90deg,#fdba74,var(--orange-d));border-radius:99px;}
  .abar i.low{background:linear-gradient(90deg,#fca5a5,#dc2626);}
  .abar i.high{background:linear-gradient(90deg,#6ee7b7,#059669);}

  /* 오답 아이템 */
  .wt-item{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
  .wt-item .wt-h{font-size:13.5px;font-weight:700;color:var(--ink);}
  .wt-item .wt-h .no{display:inline-block;background:#fee2e2;color:#dc2626;font-weight:800;border-radius:6px;padding:1px 7px;margin-right:6px;font-size:12px;}
  .wt-item .wt-a{font-size:11.5px;color:var(--muted);margin-left:2px;}
  .wt-item .wt-c{font-size:12.5px;color:#555;margin-top:5px;line-height:1.6;background:#fff7ec;border:1px solid #fcdcb8;border-radius:8px;padding:7px 9px;}
  .wt-item .vjump{float:right;font-size:11px;color:#dc2626;font-weight:800;}

  /* 비교 칩 */
  .cmp{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .cmp .chip{font-size:12px;font-weight:700;border-radius:999px;padding:5px 11px;}
  .cmp .solved{background:#dcfce7;color:#166534;}
  .cmp .still{background:#fee2e2;color:#991b1b;}
  .cmp .newx{background:#fef3c7;color:#92400e;}

  /* 원장 테이블 */
  .mtable-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:10px;}
  table.mx{border-collapse:collapse;font-size:12px;white-space:nowrap;}
  table.mx th,table.mx td{border:1px solid var(--line);padding:5px 7px;text-align:center;}
  table.mx thead th{background:#f7f9fc;position:sticky;top:0;font-weight:700;font-size:11px;}
  table.mx tbody th{position:sticky;left:0;background:#fff;font-weight:800;z-index:2;}
  table.mx td.ox{cursor:pointer;font-weight:800;width:26px;}
  table.mx td.o{color:#16a34a;}
  table.mx td.x{color:#dc2626;background:#fff1f1;}
  table.mx td.wc{font-weight:800;background:#f7f9fc;}

  /* 편집 폼 */
  textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:13px;font-family:'Pretendard',sans-serif;resize:vertical;}
  .row-inline{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
  .savebar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:11px 14px;display:flex;gap:10px;justify-content:center;align-items:center;z-index:25;flex-wrap:wrap;}
  .savebar .status{font-size:12px;color:var(--muted);}
  .toast{position:fixed;left:50%;bottom:76px;transform:translateX(-50%);background:#2d3436;color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;z-index:60;opacity:0;transition:.25s;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .tabs button{background:#fff;border:1px solid var(--line);padding:9px 14px;border-radius:9px;font-size:13.5px;font-weight:700;color:#555;}
  .tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  .ed-row{display:grid;grid-template-columns:34px 1.2fr 1fr 2fr;gap:6px;align-items:center;margin-bottom:6px;}
  .ed-row .no{font-weight:800;text-align:center;color:var(--muted);font-size:12px;}
  .ed-row input{padding:7px 9px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;width:100%;}
  .ed-row .area{font-size:11px;color:var(--muted);text-align:center;}
  @media(max-width:620px){.ed-row{grid-template-columns:28px 1fr;} .ed-row .area{display:none;}}
  .pill{display:inline-block;font-size:11px;font-weight:700;border-radius:999px;padding:2px 9px;}
  .pill.on{background:#dcfce7;color:#166534;} .pill.off{background:#f1f5f9;color:#64748b;}

  /* ─── 신규: 단계별 분석 ─── */
  .tier-section{border-radius:12px;overflow:hidden;margin:10px 0;}
  .tier-row{display:flex;align-items:center;gap:10px;padding:10px 14px;}
  .tier-row.t27{background:var(--t27bg);border-left:4px solid var(--t27);}
  .tier-row.t34{background:var(--t34bg);border-left:4px solid var(--t34);}
  .tier-row.t42{background:var(--t42bg);border-left:4px solid var(--t42);}
  .tier-badge{font-size:11.5px;font-weight:800;border-radius:6px;padding:3px 8px;min-width:52px;text-align:center;}
  .tier-badge.t27{background:var(--t27);color:#fff;}
  .tier-badge.t34{background:var(--t34);color:#fff;}
  .tier-badge.t42{background:var(--t42);color:#fff;}
  .tier-info{flex:1;}
  .tier-info .ti-label{font-size:12px;color:var(--muted);}
  .tier-info .ti-score{font-size:15px;font-weight:800;}
  .tier-bar-wrap{flex:2;min-width:80px;}
  .tier-bar{height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden;}
  .tier-bar i{display:block;height:100%;border-radius:99px;transition:width .4s;}
  .tier-bar i.t27{background:var(--t27);}
  .tier-bar i.t34{background:var(--t34);}
  .tier-bar i.t42{background:var(--t42);}
  .tier-bar i.low27{background:#93c5fd;}
  .tier-bar i.low34{background:#fdba74;}
  .tier-bar i.low42{background:#fca5a5;}
  .tier-comment{font-size:12px;color:#555;margin-top:6px;padding:7px 10px;background:#f9fafb;border-radius:8px;border-left:3px solid #d1d5db;}

  /* ─── 신규: 점수 추이 그래프 ─── */
  .sparkline-wrap{padding:14px;background:var(--card);border-radius:12px;border:1px solid var(--line);margin:10px 0;}
  .sparkline-wrap h4{font-size:13.5px;font-weight:700;margin-bottom:10px;color:var(--ink);}
  .sparkline-wrap svg{width:100%;overflow:visible;}
  .spark-no-data{font-size:12.5px;color:var(--muted);text-align:center;padding:20px 0;}

  /* ─── 신규: 처방 교재 ─── */
  .rx-section{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px;margin:10px 0;}
  .rx-section h4{font-size:13.5px;font-weight:800;color:#14532d;margin-bottom:10px;}
  .rx-item{background:#fff;border:1px solid #d1fae5;border-radius:9px;padding:10px 12px;margin-bottom:8px;}
  .rx-item .rx-type{font-size:13px;font-weight:700;color:#166634;margin-bottom:5px;}
  .rx-item .rx-star{font-size:11px;background:#dcfce7;color:#166534;border-radius:4px;padding:1px 6px;margin-left:4px;font-weight:700;}
  .rx-item .rx-cnt{font-size:11px;background:#fee2e2;color:#991b1b;border-radius:4px;padding:1px 6px;font-weight:700;}
  .rx-book{font-size:12px;color:#374151;margin-top:3px;display:flex;align-items:baseline;gap:5px;}
  .rx-book::before{content:'📚';font-size:11px;flex-shrink:0;}
  .rx-book .bname{font-weight:700;color:#1d4ed8;}
  .rx-book .bunit{color:#6b7280;}

  /* ─── 신규: 레벨 예측 ─── */
  .level-badge{display:inline-flex;align-items:center;gap:6px;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:800;}
  .level-kyungsi{background:#fef3c7;color:#92400e;border:1px solid #fde68a;}
  .level-simhwa{background:#ede9fe;color:#5b21b6;border:1px solid #ddd6fe;}
  .level-silryeok{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe;}
  .level-ilpum{background:#dcfce7;color:#166534;border:1px solid #bbf7d0;}
  .level-entry{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;}

  /* ─── 신규: 원장 누적 그래프 ─── */
  .score-trend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin:10px 0;}
  .score-chip{background:#f0f4ff;border:1px solid #c7d2fe;border-radius:8px;padding:7px 6px;text-align:center;}
  .score-chip .sc-rnd{font-size:11px;color:#6b7280;margin-bottom:2px;}
  .score-chip .sc-val{font-size:16px;font-weight:900;color:#3730a3;}

  /* 코치 메시지 */
  .coach-msg{background:linear-gradient(135deg,#fef9f0,#fff7ed);border:1px solid #fde68a;border-radius:12px;padding:14px;margin:10px 0;}
  .coach-msg .coach-icon{font-size:22px;margin-bottom:5px;}
  .coach-msg .coach-text{font-size:13.5px;color:#78350f;line-height:1.7;font-weight:500;}
  .coach-msg .coach-sub{font-size:12px;color:#92400e;margin-top:5px;line-height:1.6;}

  @media print{header,.savebar,.tabs{display:none !important;}}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <h2>중급 모의고사 진단</h2>
    <p>이름을 입력하고 입장하세요.</p>
    <input type="text" id="pw" placeholder="이름" onkeypress="if(event.key==='Enter')enter()">
    <button onclick="enter()">입장</button>
    <div class="err" id="gate-err"></div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="t">중급 모의고사 진단<small id="h-sub"></small></div>
    <div>
      <a href="index.html">← 아카이브</a>
      <button onclick="location.reload()">나가기</button>
    </div>
  </header>
  <div class="wrap" id="main"></div>
</div>

<div id="teacher-savebar" class="savebar hidden">
  <span class="status" id="save-status">원장 모드</span>
  <button class="btn navy sm" onclick="reloadResults()">🔄 결과 새로고침</button>
  <button class="btn ok sm" onclick="saveMock()">💾 유형·정답 저장</button>
  <button class="btn gray sm" onclick="showCode()">📋 코드</button>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="mock-data.js"></script>
<script>
/* =========================================================
 * 지필드 영재교육 · 중급 모의고사 진단 v2
 * 처방 시스템 + 단계별 분석 + 점수 추이 그래프 추가
 * ========================================================= */

const REPO="docssam1/hs-report", FILE="mock-data.js", BRANCH="main";
const SUPA_URL="https://fgahqumaldheqettmvqg.supabase.co";
const SUPA_KEY="sb_publishable_OsjJG92BLMaZrc2jTClt0g_ecdTtf_I";
const D=window.GFIELD_DATA||{students:[]};
const M=window.GFIELD_MOCK;
M.results=M.results||{};
let mode=null, me=null, curRound="1";

/* ─── 처방 교재 데이터 ────────────────────────────────────

 *   시중교재   : 3%올림피아드, 수학경시 문제의 정석(MEX) 등
 *   프리미어 수학: 프리미어 수학 시리즈
 *   필즈더클래식: 필즈 초급·입문 상/중/하, GM초급·중급
 *   지필드     : GIFTED MATH 3 V1-1~3, ThinkingCore CH1~5
 * 교재매핑 8종(8개 md) 기반 · 추후 프리미어 수학 단원 확인 필요
 * ─────────────────────────────────────────────────────── */
const PRESCRIPTION = [

  },
  { kw:['달력','요일','날짜','달력의 요일'],
    label:'달력·요일', star:'★2.7~3.4',
    books:{
      '시중교재':[{b:'3%올림피아드 1과정',u:'11장 요일에 관한 문제'}],
      '프리미어 수학':[{b:'프리미어 수학',u:'달력·요일 단원'}],

  /* ★3.4 중심 ───────────────────────────────────────── */
  { kw:['시침','분침','시계','시각의 각'],
    label:'달력·요일(시계)', star:'★3.4',
    books:{
      '시중교재':[{b:'3%올림피아드 1과정',u:'29장 시침과 분침의 각도'},{b:'3%올림피아드 2과정',u:'17장 시침과 분침의 각도'}],
      '프리미어 수학':[],

    },
    pts:['분침 6°/분 · 시침 0.5°/분','같은 방향으로 겹치는 시각: 0, 65.45분, 130.9분…','각도 = |분침각 - 시침각|']
  },
  { kw:['고장난 시계','이상한 시계','빠르게 가는','느리게 가는','빨리 가는'],
    label:'달력·요일(고장난 시계)', star:'★3.4',
    books:{
      '시중교재':[{b:'3%올림피아드 2과정',u:'36장 이상한 시계'}],
      '프리미어 수학':[],
      '필즈더클래식':[],

/* 세부유형 텍스트에서 처방 찾기 (키워드 매칭) */
function findRx(typeText){
  if(!typeText) return null;
  const t = typeText.toLowerCase();
  for(const rx of PRESCRIPTION){
    if(rx.kw.some(k => t.includes(k.toLowerCase()))) return rx;
  }
  return null;
}

  return {label:'입문반', cls:'level-entry', icon:'📗'};
}

/* ★단계별 분석 */
function scoreByTier(ox){
  const tiers={27:{q:0,ok:0,max:0},34:{q:0,ok:0,max:0},42:{q:0,ok:0,max:0}};
  for(let n=1;n<=Q();n++){
    const b=bp(n); const key=Math.round(b.pts*10);
    if(!tiers[key]) continue;
    tiers[key].q++;
    tiers[key].max+=b.pts;
    if(ox[n-1]!=='X') tiers[key].ok++;
  }
  return tiers;
}

/* 점수 추이 SVG */
function svgSparkline(student){
  const rs=roundKeys().filter(r=>latestOx(student,r));
  if(rs.length<2) return '';
  const scores=rs.map(r=>({r:r,sc:scoreOf(latestOx(student,r)).score,lbl:M.rounds[r].title||r+'회'}));
  const maxSc=100, W=280, H=80, pad=20;
  const pts=scores.map((s,i)=>{
    const x=pad+(i/(scores.length-1))*(W-pad*2);
    const y=H-pad-(s.sc/maxSc)*(H-pad*2);
    return {x,y,sc:s.sc,lbl:s.lbl};
  });
  let path='M'+pts.map(p=>p.x.toFixed(1)+','+p.y.toFixed(1)).join(' L');
  let svgDots='';
  pts.forEach(p=>{
    svgDots+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="#f97316"/>`;
    svgDots+=`<text x="${p.x.toFixed(1)}" y="${(p.y-8).toFixed(1)}" text-anchor="middle" font-size="9" fill="#ea580c" font-weight="800">${p.sc}</text>`;
    svgDots+=`<text x="${p.x.toFixed(1)}" y="${(H+4).toFixed(1)}" text-anchor="middle" font-size="9" fill="#9ca3af">${p.lbl}</text>`;
  });
  return `<div class="sparkline-wrap">
    <h4>📈 회차별 점수 추이</h4>
    <svg viewBox="0 0 ${W} ${H+14}" xmlns="http://www.w3.org/2000/svg">
      <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#e5e7eb" stroke-width="1"/>
      <path d="${path}" fill="none" stroke="#fdba74" stroke-width="2.5" stroke-linejoin="round"/>
      ${svgDots}
    </svg>
  </div>`;
}

/* ─── 세부유형 키워드 매핑 ────────────────────────────── */
function findRx(typeText){
  if(!typeText) return null;
  const t=typeText.toLowerCase();
  for(const rx of PRESCRIPTION){
    if(rx.kw.some(k=>t.includes(k.toLowerCase()))) return rx;
  }
  return null;
}

/* 전체 약점 처방 섹션 (누적 분석) */
function prescriptionHTML(wl, limit){
  const rxMap={};

/* ─── 기존 유틸 ─────────────────────────────────────────── */
function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2400); }
function bp(no){ return M.blueprint.find(b=>b.no===no)||{no:no,area:'',pts:0}; }
function roundKeys(){ return Object.keys(M.rounds).sort((a,b)=>+a-+b); }
function roundItems(r){ return (M.rounds[r]&&M.rounds[r].items)||[]; }
function itemOf(r,no){ return roundItems(r).find(i=>i.no===no)||{no:no,type:'',answer:'',comment:''}; }

function latexToPlain(s){ return (s||'').replace(/\$(.*?)\$/g,function(m,x){ return x.replace(/\\dfrac|\\frac/g,'').replace(/\{(\d+)\}\{(\d+)\}/g,'$1/$2').replace(/[{}]/g,''); }); }
function vidUrl(r,t){ var v=(M.rounds[r]&&M.rounds[r].video)||''; if(!v) return ''; if(t&&+t>0){ v += (v.indexOf('?')>=0?'&':'?')+'t='+Math.floor(t); } return v; }

/* ─── 채점 계산 ──────────────────────────────────────────── */
function blankOx(){ const a=[]; for(let i=0;i<Q();i++) a.push('O'); return a; }
function scoreOf(ox){ let s=0,wrong=0; for(let n=1;n<=Q();n++){ if(ox[n-1]==='X') wrong++; else s+=bp(n).pts; } return {score:Math.round(s*10)/10, wrong:wrong, correct:Q()-wrong}; }
function areaStats(ox){ const map={}; M.areas.forEach(a=>map[a]={tot:0,got:0,cnt:0,ok:0}); for(let n=1;n<=Q();n++){ const b=bp(n); if(!map[b.area]) map[b.area]={tot:0,got:0,cnt:0,ok:0}; map[b.area].tot+=b.pts; map[b.area].cnt++; if(ox[n-1]!=='X'){ map[b.area].got+=b.pts; map[b.area].ok++; } } return map; }
function wrongList(r,ox){ const out=[]; for(let n=1;n<=Q();n++){ if(ox[n-1]==='X'){ const it=itemOf(r,n); const b=bp(n); out.push({no:n, area:b.area, pts:b.pts, type:it.type, comment:it.comment, t:it.t||0}); } } return out; }
function typeComment(it){ if(it.comment&&it.comment.trim()) return it.comment; if(it.type) return "'"+it.type+"' 유형이에요. 풀이 강의를 보며 방법을 익힌 뒤, 며칠 뒤 새 종이에 스스로 다시 풀어보세요."; return "풀이 강의를 보며 방법을 익힌 뒤 스스로 다시 풀어보세요."; }

/* ─── 결과 저장 ──────────────────────────────────────────── */
function attemptsOf(student,r){ M.results[student]=M.results[student]||{}; M.results[student][r]=M.results[student][r]||[]; return M.results[student][r]; }
function latestOx(student,r){ const a=attemptsOf(student,r); return a.length? a[a.length-1].ox : null; }
function pushAttempt(student,r,ox,by){ const a=attemptsOf(student,r); a.push({ox:ox.slice(), ts:new Date().toISOString().slice(0,10), by:by||'parent'}); while(a.length>3) a.shift(); }
function lsKey(){ return 'gfield_mock_'+me; }
function loadLocal(){ try{ const j=localStorage.getItem(lsKey()); if(j){ M.results[me]=JSON.parse(j); } }catch(e){} }
function saveLocal(){ try{ localStorage.setItem(lsKey(), JSON.stringify(M.results[me]||{})); }catch(e){} }

function openMark(r){

}
function renderMark(){

  const hint='<div class="hint" style="margin-bottom:6px">🔴 경계 빨강=4.2점 · 🟡 노랑=3.4점 · 흰색=2.7점 · <b>틀린 번호만</b> 눌러 ✕ 표시하세요</div>';

      ${hint}${attemptBtns}

      </div>
      <button class="btn pri" style="width:100%;margin-top:8px" onclick="submitAttempt()">결과 제출 및 분석 보기 →</button>

}
function toggleQ(n){ markOx[n-1]= markOx[n-1]==='X'?'O':'X'; renderMark(); }
function loadAttempt(i){ const a=attemptsOf(me,curRound); if(a[i]){ markOx=a[i].ox.slice(); renderMark(); } }
async function submitAttempt(){
  const at=attemptsOf(me,curRound);
  if(at.length>=3){ if(!confirm('이미 3회 응시했어요. 가장 오래된 기록을 지우고 새로 저장할까요?')) return; }
  const prev = at.length? at[at.length-1].ox.slice() : null;
  pushAttempt(me,curRound,markOx,'parent'); saveLocal();
  const ok=await supaUpsert(me,curRound,markOx,'parent');
  toast(ok?'제출 완료 · 원장님께 자동 전송됐어요 ✅':'제출 저장됨(자동전송 실패) — 코드로 보내주세요');
  renderReport(me,curRound,prev,ok);
}

/* ─── 학부모용 분석 리포트 (전면 개선) ──────────────────── */
function renderReport(student,r,prevOx,sent){
  const at=attemptsOf(student,r);
  const ox=at[at.length-1].ox;
  const sc=scoreOf(ox);
  const as=areaStats(ox);
  const wl=wrongList(r,ox);
  const tiers=scoreByTier(ox);
  const lv=levelLabel(sc.score);
  const gName=givenName(student);

  /* ── 헤더: 점수 카드 ── */
  let h=`<div class="card">
    <div class="row-inline" style="justify-content:space-between;margin-bottom:6px">
      <div class="row-inline" style="gap:6px;margin-bottom:0">
        <button class="btn gray sm" onclick="renderRoundPick()">‹ 회차 선택</button>
        <b>${esc(gName)} · ${esc(M.rounds[r].title||r+'회')} 분석 결과</b>
      </div>
      ${sent!==undefined?`<span class="pill ${sent?'on':'off'}">${sent?'원장님께 전송됨':'전송 대기'}</span>`:''}
    </div>
    <div class="scorebar">
      <div><div class="big">${sc.score}</div><div class="lbl">점 / 100점</div></div>
      <div><div class="big" style="color:#334">${sc.correct} / ${Q()}</div><div class="lbl">맞은 개수</div></div>
      <div><div class="big" style="color:#dc2626">${sc.wrong}</div><div class="lbl">틀린 개수</div></div>
      <div><div class="big" style="color:#334">${at.length}<span style="font-size:15px;color:#889">회</span></div><div class="lbl">응시</div></div>
    </div>
    <div class="row-inline" style="margin-top:8px">
      <span class="level-badge ${lv.cls}">${lv.icon} 현재 수준 예측: <b>${lv.label}</b></span>
      <span class="hint" style="margin:0;font-size:11px">경시55·심화44·실력35·일품25.7점 기준</span>
    </div>
  </div>`;

  /* ── 이전 대비 변화 ── */
  if(prevOx){
    let solved=[],still=[],neo=[];
    for(let n=1;n<=Q();n++){
      const p=prevOx[n-1]==='X', c=ox[n-1]==='X';
      if(p&&!c) solved.push(n); else if(p&&c) still.push(n); else if(!p&&c) neo.push(n);
    }
    h+=`<div class="card" style="padding:12px 14px">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">📊 지난 응시 대비 변화</div>
      <div class="cmp">
        <span class="chip solved">✅ 새로 맞힘 ${solved.length}개: ${solved.join(', ')||'-'}</span>
        <span class="chip still">🔁 반복 오답 ${still.length}개: ${still.join(', ')||'-'}</span>
        <span class="chip newx">⚠️ 새로 틀림 ${neo.length}개: ${neo.join(', ')||'-'}</span>
      </div>
    </div>`;
  }

  /* ── 단계별 분석 ── */
  h+=`<div class="card">
    <h3 style="margin-bottom:10px">📊 단계별 정답률</h3>
    ${tierHTML(tiers, tierComment(tiers))}
  </div>`;

  /* ── 점수 추이 (다회 응시 시) ── */
  const spark=svgSparkline(student);
  if(spark) h+=`<div class="card" style="padding:12px 14px">${spark}</div>`;

  /* ── 영역별 수행률 ── */
  h+=`<div class="card"><h3>영역별 수행률</h3>`;
  M.areas.forEach(a=>{
    const s=as[a]||{tot:0,got:0,cnt:0,ok:0};
    const pct=s.tot?Math.round(s.got/s.tot*100):0;
    h+=`<div class="area-row">
      <div class="at"><b>${esc(a)}</b><span>${s.ok}/${s.cnt}문항 · ${pct}%</span></div>
      <div class="abar"><i class="${pct>=70?'high':pct<50?'low':''}" style="width:${pct}%"></i></div>
    </div>`;
  });
  h+='</div>';

  /* ── 오답 문항 상세 ── */
  const hasVid=(M.rounds[r]&&M.rounds[r].video);
  h+=`<div class="card">
    <div class="row-inline" style="justify-content:space-between;margin-bottom:6px">
      <h3 style="margin:0">📋 오답 문항 상세 분석</h3>
      ${hasVid?`<button class="btn navy sm" onclick="openVid('${r}',0)">▶ 전체 풀이 영상</button>`:''}
    </div>`;
  if(!wl.length){
    h+='<div class="hint">틀린 문항이 없어요. 훌륭합니다! 🎉</div>';
  } else {
    h+='<div class="hint">문항을 누르면 해당 풀이 영상으로 바로 이동해요.</div>';
    wl.forEach(w=>{
      const it=itemOf(r,w.no);
      const tierCls=w.pts>=4?'border-color:#fca5a5':w.pts>=3?'border-color:#fde68a':'';
      const clk=hasVid?`onclick="openVid('${r}',${w.t})" style="cursor:pointer"`:'';
      h+=`<div class="wt-item" ${clk} style="${tierCls}">
        <div class="wt-h">
          <span class="no">${w.no}번</span>${esc(w.type||'(유형 준비중)')}
          <span class="wt-a"> · ${esc(w.area)} · ${w.pts}점</span>
          ${hasVid?'<span class="vjump">▶ 영상</span>':''}
        </div>
        <div class="wt-c">${esc(typeComment(it))}</div>
      </div>`;
    });
  }
  h+='</div>';

  /* ── 처방 교재 ── */
  const rxHtml=prescriptionHTML(wl,5);
  if(rxHtml) h+=`<div class="card" style="padding:0;border:none;background:transparent">${rxHtml}</div>`;

  /* ── 코치 메시지 ── */
  const msg=coachMsg(false);
  const msgP=coachMsg(true);
  if(msg||msgP){
    h+=`<div class="coach-msg">
      <div class="coach-icon">💬</div>
      ${msg?`<div class="coach-text">${esc(msg)}</div>`:''}
      ${msgP?`<div class="coach-sub">📌 학부모님께 — ${esc(msgP)}</div>`:''}
    </div>`;
  }

  /* ── 전송 실패 시 코드 ── */
  if(sent===false){
    const code=btoa(unescape(encodeURIComponent(JSON.stringify({s:student,r:r,ox:ox.join('')}))));
    h+=`<div class="card"><h3>💬 자동 전송이 안 됐어요</h3>
      <div class="hint">아래 코드를 복사해 원장님께 카톡으로 보내주세요.</div>
      <textarea id="sendcode" rows="2" readonly>${code}</textarea>
      <div class="row-inline" style="margin-top:8px">
        <button class="btn navy sm" onclick="copyCode()">코드 복사</button>
        <a class="btn pri sm" style="text-decoration:none" href="https://open.kakao.com/me/gfield" target="_blank" rel="noopener">카톡으로 열기</a>
      </div></div>`;
  }

  document.getElementById('main').innerHTML=h;
}
function copyCode(){ const t=document.getElementById('sendcode'); t.select(); try{ navigator.clipboard.writeText(t.value); }catch(e){ document.execCommand('copy'); } toast('코드가 복사됐어요.'); }

/* ─── 원장 모드 ──────────────────────────────────────────── */

async function reloadResults(){ const st=document.getElementById('save-status'); st.textContent='불러오는 중…'; const ok=await supaLoadAll(); st.textContent=ok?'✅ 최신 결과 불러옴':'불러오기 실패'; renderTeacher(); }

    <div class="row-inline">

function tPick(v){ tSel=v; tStudent(); }
function tSeed(r,n){ pushAttempt(tSel,r,blankOx(),'teacher'); tToggle(r,n); }
function tToggle(r,n){ const ox=latestOx(tSel,r); if(!ox) return; ox[n-1]= ox[n-1]==='X'?'O':'X'; tStudent(); supaUpsert(tSel,r,ox,'teacher').then(ok=>{ document.getElementById('save-status').textContent= ok?'✅ 저장됨':'저장 실패'; }); }

/* ─── 원장용 누적 분석 (개선) ───────────────────────────── */
function tAnalysisHTML(student){
  const rs=roundKeys().filter(r=>latestOx(student,r));
  if(!rs.length) return '<div class="card"><div class="hint">아직 응시 기록이 없습니다.</div></div>';

  const areaAgg={}; M.areas.forEach(a=>areaAgg[a]={tot:0,got:0});
  const tierAgg={27:{q:0,ok:0},34:{q:0,ok:0},42:{q:0,ok:0}};
  const typeCnt={}; const scores=[];
  const allWrong=[];

  rs.forEach(r=>{
    const ox=latestOx(student,r);
    const as=areaStats(ox);
    const t=scoreByTier(ox);
    M.areas.forEach(a=>{ areaAgg[a].tot+=as[a].tot; areaAgg[a].got+=as[a].got; });
    [27,34,42].forEach(k=>{ if(t[k]){tierAgg[k].q+=t[k].q; tierAgg[k].ok+=t[k].ok;} });
    scores.push({r:r,sc:scoreOf(ox).score});
    const wl=wrongList(r,ox);
    wl.forEach(w=>{ allWrong.push(w); const key=w.type||('('+w.area+')'); typeCnt[key]=(typeCnt[key]||0)+1; });
  });

  const gName=givenName(student);
  const avgScore=rs.length?Math.round(scores.reduce((a,s)=>a+s.sc,0)/rs.length*10)/10:0;
  const lv=levelLabel(avgScore);

  let h=`<div class="card">
    <h3>📊 ${esc(gName)} 누적 분석 · 응시 ${rs.length}회차</h3>`;

  /* 회차별 점수 칩 */
  h+='<div class="score-trend-grid">';
  scores.forEach(s=>{
    const l=levelLabel(s.sc);
    h+=`<div class="score-chip"><div class="sc-rnd">${esc(M.rounds[s.r].title||s.r+'회')}</div><div class="sc-val">${s.sc}</div><div style="font-size:10px;color:#6b7280">${l.icon}${l.label}</div></div>`;
  });
  h+='</div>';

  /* 평균 레벨 */
  h+=`<div class="row-inline" style="margin:8px 0">
    <span class="level-badge ${lv.cls}">${lv.icon} 평균 ${avgScore}점 → ${lv.label} 수준</span>
  </div>`;

  /* 그래프 */
  const spark=svgSparkline(student);
  if(spark) h+=spark;

  /* 단계별 누적 */
  h+='<h3 style="margin:12px 0 8px">★단계별 누적 정답률</h3>';
  h+=tierHTML(tierAgg, tierComment(tierAgg));

  /* 영역별 수행률 */
  h+='<h3 style="margin:12px 0 8px">영역별 수행률</h3>';
  M.areas.forEach(a=>{
    const s=areaAgg[a]; const pct=s.tot?Math.round(s.got/s.tot*100):0;
    h+=`<div class="area-row"><div class="at"><b>${esc(a)}</b><span>${pct}%</span></div><div class="abar"><i class="${pct>=70?'high':pct<50?'low':''}" style="width:${pct}%"></i></div></div>`;
  });

  /* 자주 틀리는 유형 TOP8 */
  const top=Object.entries(typeCnt).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(top.length){
    h+='<h3 style="margin:12px 0 8px">🔴 자주 틀리는 세부 유형</h3>';
    top.forEach(([t,c])=>{ h+=`<div class="wt-item"><div class="wt-h"><span class="no">${c}회</span>${esc(t)}</div></div>`; });
  }
  h+='</div>';

  /* 처방 교재 */
  const rxHtml=prescriptionHTML(allWrong, 6);
  if(rxHtml) h+=`<div class="card" style="padding:0;border:none;background:transparent">${rxHtml}</div>`;

  return h;
}

/* ─── 반 전체 약점 ───────────────────────────────────────── */

      const wl=wrongList(r,ox);

    const s=areaAgg[a]; const pct=s.tot?Math.round(s.got/s.tot*100):0;

/* ─── 수동 코드 입력 ─────────────────────────────────────── */
function tImport(){

async function doImport(){
  const raw=document.getElementById('impcode').value.trim(); if(!raw){ return; }
  const lines=raw.split(/\s+/).filter(Boolean); let ok=0,fail=0,names=[];
  for(const code of lines){ try{ const o=JSON.parse(decodeURIComponent(escape(atob(code)))); if(o&&o.s&&o.r&&o.ox&&o.ox.length===Q()){ M.results[o.s]=M.results[o.s]||{}; M.results[o.s][o.r]=[{ox:o.ox.split(''),ts:new Date().toISOString().slice(0,10),by:'parent'}]; await supaUpsert(o.s,o.r,o.ox,'parent'); ok++; names.push(o.s+' '+(M.rounds[o.r]?M.rounds[o.r].title:o.r)); } else fail++; }catch(e){ fail++; } }
  document.getElementById('imp-res').innerHTML=`✅ ${ok}건 반영${fail?(' · ❌ '+fail+'건 실패'):''}${names.length?('<br>'+names.map(esc).join(', ')):''}`;
  toast(ok+'건 반영 완료');
}

      <input value="${esc(it.type)}" placeholder="세부유형" oninput="edSet('${r}',${n},'type',this.value)">
      <div><input value="${esc(it.answer)}" placeholder="정답" oninput="edSet('${r}',${n},'answer',this.value)" style="width:100%"><div style="font-size:12px;color:#0a7a3d;margin-top:3px;min-height:14px">${esc(it.answer)}</div></div>
      <div style="display:flex;gap:6px"><span class="area" style="min-width:74px;font-size:11px;color:#6b7280">${esc(b.area)} · ${b.pts}</span><input value="${esc(it.comment)}" placeholder="오답 코멘트(선택)" oninput="edSet('${r}',${n},'comment',this.value)" style="flex:1"></div>
    </div>`;
  }
  h+='</div>';
  document.getElementById('t-body').innerHTML=h;
}
function edSet(r,n,k,v){ const items=M.rounds[r].items=M.rounds[r].items||[]; let it=items.find(x=>x.no===n); if(!it){ it={no:n,type:'',answer:'',comment:''}; items.push(it); items.sort((a,b)=>a.no-b.no); } it[k]=v; markDirty(); }

/* ─── GitHub 저장 ────────────────────────────────────────── */
function markDirty(){ const s=document.getElementById('save-status'); if(s) s.textContent='● 변경됨 — 저장 필요'; }
function buildMockFile(){
  const out={title:M.title,areas:M.areas,roundCount:M.roundCount,questions:M.questions,blueprint:M.blueprint,rounds:M.rounds,results:{}};
  return "/* =========================================================\n * 지필드 영재교육 · 중급 모의고사 진단 데이터\n * (결과는 Supabase에 저장됩니다. 이 파일은 유형·정답·영상만)\n * 저장: "+new Date().toLocaleString('ko-KR')+"\n * ========================================================= */\nwindow.GFIELD_MOCK = "+JSON.stringify(out,null,2)+";\n";
}
function ghToken(){ let t=null; try{ t=localStorage.getItem('gfield_gh_token'); }catch(e){} if(!t){ t=prompt('GitHub 토큰 (Contents: Read and write)'); if(!t) return null; t=t.trim(); try{ localStorage.setItem('gfield_gh_token',t); }catch(e){} } return t; }
async function saveMock(){
  const token=ghToken(); if(!token) return;
  const st=document.getElementById('save-status'); st.textContent='저장 중…';
  try{
    let sha=null; const g=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}?ref=${BRANCH}`,{headers:{Authorization:'token '+token,Accept:'application/vnd.github+json'}}); if(g.ok){ sha=(await g.json()).sha; }
    const b64=btoa(unescape(encodeURIComponent(buildMockFile())));
    const p=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{method:'PUT',headers:{Authorization:'token '+token,Accept:'application/vnd.github+json'},body:JSON.stringify({message:'Update mock-data.js (types/answers)',content:b64,sha:sha,branch:BRANCH})});
    if(p.ok){ st.textContent='✅ 저장 완료 (1~2분 후 반영)'; toast('저장 완료 ✅'); }
    else{ const e=await p.json(); st.textContent='저장 실패: '+(e.message||p.status); if(p.status===401||p.status===403) toast('토큰 권한 확인'); }
  }catch(e){ st.textContent='네트워크 오류'; toast('저장 실패'); }
}
function showCode(){ const w=window.open('','_blank'); w.document.write('<pre style="white-space:pre-wrap;word-break:break-all;font-size:12px;padding:12px">'+buildMockFile().replace(/</g,'&lt;')+'</pre>'); }

/* ─── LaTeX ──────────────────────────────────────────────── */
let _mathT=null;
function typeset(){ if(!window.renderMathInElement) return; clearTimeout(_mathT); _mathT=setTimeout(function(){ try{ renderMathInElement(document.getElementById('main'),{delimiters:[{left:'$',right:'$',display:false}],throwOnError:false,ignoredClasses:['katex']}); }catch(e){} },20); }
(function(){ var m=document.getElementById('main'); if(m&&window.MutationObserver){ new MutationObserver(typeset).observe(m,{childList:true,subtree:true}); } window.addEventListener('load',typeset); })();

/* ─── URL 직접 진입 ──────────────────────────────────────── */
(function initFromUrl(){
  const p=new URLSearchParams(location.search); const rd=p.get('round');
  let stu=''; try{ stu=localStorage.getItem('gfield_student')||''; }catch(e){}
  if(stu && stu.toLowerCase()==='docssam'){ mode='teacher'; me='원장'; startTeacher(); return; }
  if(stu && (D.students||[]).includes(stu)){
    mode='parent'; me=stu; startParent();
    if(rd && M.rounds[rd]) openMark(rd);
    return;
  }
  if(rd){ window._pendingRound=rd; document.getElementById('gate-err').textContent='이름을 입력하면 '+((M.rounds[rd]&&M.rounds[rd].title)||(rd+'회'))+' 진단으로 바로 들어갑니다.'; }
})();
</script>
