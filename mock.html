<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지필드 영재교육 | 중급 모의고사 진단</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
  :root{
    --navy:#1e3c72;--navy2:#2a5298;--orange:#f97316;--orange-d:#ea580c;
    --ink:#2d3436;--muted:#6b7280;--bg:#eef1f6;--card:#fff;--line:#e3e8ef;
    --ok:#27ae60;--danger:#e74c3c;--soft:#fff3e6;
    --t27:#3b82f6;--t34:#f97316;--t42:#dc2626;
    --t27bg:#eff6ff;--t34bg:#fff7ed;--t42bg:#fff1f1;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
  body{background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent;}
  button{cursor:pointer;font-family:inherit;}
  .hidden{display:none !important;}
  .wrap{max-width:960px;margin:0 auto;padding:16px 14px 100px;}

  /* 게이트 */
  #gate{position:fixed;inset:0;z-index:30;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#10203f,#26447f);padding:20px;}
  .gate-box{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);padding:40px 30px;border-radius:18px;width:100%;max-width:380px;text-align:center;color:#fff;}
  .gate-box h2{font-size:21px;font-weight:800;margin-bottom:4px;}
  .gate-box p{font-size:12.5px;opacity:.75;margin-bottom:22px;line-height:1.6;}
  .gate-box input{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;text-align:center;margin-bottom:12px;outline:none;}
  .gate-box button{width:100%;padding:14px;border:none;border-radius:10px;background:var(--orange);color:#fff;font-size:16px;font-weight:800;}
  .gate-box .err{color:#ffe0b8;font-size:12.5px;min-height:18px;margin-top:6px;line-height:1.5;}

  /* 헤더 */
  header{background:var(--navy);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20;}
  header .t{font-weight:800;font-size:16px;}
  header .t small{display:block;font-weight:500;opacity:.7;font-size:11px;}
  header a,header button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 12px;border-radius:8px;font-size:12.5px;font-weight:600;text-decoration:none;}

  /* 공통 카드/버튼 */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
  .card h3{font-size:15px;margin-bottom:8px;}
  .hint{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:10px;}
  .select{padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;}
  .btn{padding:11px 16px;border:none;border-radius:9px;font-weight:800;font-size:14px;}
  .btn.pri{background:linear-gradient(135deg,#fb923c,var(--orange-d));color:#fff;}
  .btn.navy{background:var(--navy);color:#fff;}
  .btn.gray{background:#eef1f6;color:#333;}
  .btn.ok{background:var(--ok);color:#fff;}
  .btn.sm{padding:7px 12px;font-size:12.5px;border-radius:8px;}

  /* 회차 선택 그리드 */
  .round-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
  .round-card{border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;cursor:pointer;background:#fff;}
  .round-card:hover{border-color:#fcd3a3;box-shadow:0 4px 12px rgba(186,110,40,.1);}
  .round-card .rn{font-size:17px;font-weight:800;color:var(--orange-d);}
  .round-card .rs{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .round-card .rcprint{margin-top:8px;font-size:11px;background:#eef1f6;border:none;border-radius:6px;padding:5px 8px;color:#334;font-weight:700;}

  /* 문항 그리드 */
  .qgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin:10px 0;}
  @media(max-width:560px){.qgrid{grid-template-columns:repeat(6,1fr);}}
  .qbtn{aspect-ratio:1;border:1.5px solid var(--line);border-radius:9px;background:#fff;font-size:14px;font-weight:800;color:#334;display:flex;align-items:center;justify-content:center;position:relative;user-select:none;}
  /* 오답 체크 안내 */
  .mk-guide{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:12px 14px;margin-bottom:10px;}
  .mk-guide .g1{font-size:15px;font-weight:800;color:#1e3a8a;line-height:1.5;}
  .mk-guide .g1 b{color:#dc2626;}
  .mk-guide .g2{font-size:12.5px;color:#475569;margin-top:6px;line-height:1.6;}
  .mk-guide .g3{font-size:11.5px;color:#94a3b8;margin-top:6px;}
  .mk-guide .exq{display:inline-flex;width:22px;height:22px;border-radius:6px;border:1.5px solid #e5e7eb;background:#fff;color:#334;font-size:12px;font-weight:800;align-items:center;justify-content:center;vertical-align:-5px;}
  .mk-guide .exq.x{background:#fee2e2;border-color:#f6a6a6;color:#dc2626;}
  /* ── 진단 화면 프리미엄 레이아웃 ── */
  .mk-hero{background:linear-gradient(135deg,#1e3c72,#2a5298);border-radius:18px;padding:20px 22px 18px;color:#fff;margin-bottom:14px;box-shadow:0 10px 26px rgba(30,60,114,.22);}
  .mk-hero-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
  .mk-badge{font-size:10.5px;font-weight:800;letter-spacing:.14em;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);padding:5px 10px;border-radius:20px;}
  .mk-hero .btn.ghostw{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 12px;font-size:12.5px;border-radius:8px;cursor:pointer;}
  .mk-title{font-size:23px;font-weight:900;letter-spacing:-.02em;margin:0 0 4px;}
  .mk-sub{font-size:12.5px;color:#c7d6ee;line-height:1.6;}
  .mk-steps{display:flex;gap:8px;margin-top:16px;}
  .mk-steps .st{flex:1;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 10px;font-size:11.5px;color:#b9cbe8;font-weight:700;}
  .mk-steps .st i{width:19px;height:19px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-style:normal;font-size:10.5px;font-weight:900;flex:none;}
  .mk-steps .st.now{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 4px 12px rgba(249,115,22,.35);}
  .mk-steps .st.now i{background:rgba(255,255,255,.28);}
  .mk-steps .st.done{color:#8fb0dd;}
  .mk-steps .st.done i{background:rgba(255,255,255,.13);}
  @media(max-width:560px){ .mk-steps{flex-direction:column;} .mk-title{font-size:20px;} }

  .qgrid .qbtn{cursor:pointer;transition:transform .08s,box-shadow .12s,background .12s;box-shadow:0 1px 2px rgba(16,24,40,.05);}
  .qgrid .qbtn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(16,24,40,.13);}
  .qgrid .qbtn.wrong{box-shadow:0 4px 12px rgba(220,38,38,.2);}
  .qgrid .qbtn.wrong::after{font-size:17px;}

  .mk-count{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);margin:2px 2px 8px;font-weight:700;}
  .mk-count .n{color:var(--danger);font-size:14px;font-weight:900;}

  .mk-score{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin:10px 0 12px;box-shadow:0 4px 14px rgba(16,24,40,.05);}
  .mk-score .sc-row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;}
  .mk-score .sc-main{display:flex;align-items:baseline;gap:5px;}
  .mk-score .sc-main .v{font-size:40px;font-weight:900;color:var(--orange-d);line-height:1;letter-spacing:-.03em;}
  .mk-score .sc-main .u{font-size:14px;font-weight:800;color:var(--muted);}
  .mk-score .sc-side{display:flex;gap:18px;margin-left:auto;}
  .mk-score .sc-side .k{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:2px;}
  .mk-score .sc-side .w{font-size:19px;font-weight:900;}
  .mk-gauge{height:9px;border-radius:20px;background:#eef1f6;overflow:hidden;margin-top:12px;}
  .mk-gauge > i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,#fb923c,#ea580c);transition:width .25s;}

  .mk-submit{width:100%;margin-top:4px;padding:15px;font-size:15.5px;font-weight:900;border:none;border-radius:13px;color:#fff;cursor:pointer;background:linear-gradient(135deg,#fb923c,#ea580c);box-shadow:0 8px 20px rgba(234,88,12,.3);transition:transform .08s;}
  .mk-submit:hover{transform:translateY(-1px);}

  .mk-info{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-top:14px;}
  .mk-info .mi-h{font-size:13.5px;font-weight:900;color:var(--navy);margin-bottom:12px;}
  .mk-info .mi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:620px){ .mk-info .mi-grid{grid-template-columns:1fr;} }
  .mk-info .mi{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:11.5px;color:var(--muted);line-height:1.6;}
  .mk-info .mi b{display:block;font-size:12.5px;color:var(--ink);margin-bottom:3px;}
  .mk-info .mi .ic{font-size:15px;margin-right:5px;}
  .qbtn.wrong{background:#fee2e2;border-color:#f6a6a6;color:#dc2626;}
  .qbtn.wrong::after{content:'✕';}
  .qbtn.wrong span{display:none;}

  /* 점수바 */
  .scorebar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--soft);border:1px solid #fcdcb8;border-radius:12px;padding:12px 14px;margin:8px 0;}
  .scorebar .big{font-size:26px;font-weight:900;color:var(--orange-d);}
  .scorebar .lbl{font-size:12px;color:var(--muted);}

  /* 영역별 바 */
  .area-row{margin:8px 0;}
  .area-row .at{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
  .area-row .at b{color:var(--ink);}
  .abar{height:9px;background:#eef1f6;border-radius:99px;overflow:hidden;}
  .abar i{display:block;height:100%;background:linear-gradient(90deg,#fdba74,var(--orange-d));border-radius:99px;}
  .abar i.low{background:linear-gradient(90deg,#fca5a5,#dc2626);}
  .abar i.high{background:linear-gradient(90deg,#6ee7b7,#059669);}

  /* 오답 아이템 */
  .wt-item{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
  .wt-item .wt-h{font-size:13.5px;font-weight:700;color:var(--ink);}
  .wt-item .wt-h .no{display:inline-block;background:#fee2e2;color:#dc2626;font-weight:800;border-radius:6px;padding:1px 7px;margin-right:6px;font-size:12px;}
  .wt-item .wt-a{font-size:11.5px;color:var(--muted);margin-left:2px;}
  .wt-item .wt-c{font-size:12.5px;color:#555;margin-top:5px;line-height:1.6;background:#fff7ec;border:1px solid #fcdcb8;border-radius:8px;padding:7px 9px;}
  .wt-item .vjump{float:right;font-size:11px;color:#dc2626;font-weight:800;}

  /* 비교 칩 */
  .cmp{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .cmp .chip{font-size:12px;font-weight:700;border-radius:999px;padding:5px 11px;}
  .cmp .solved{background:#dcfce7;color:#166534;}
  .cmp .still{background:#fee2e2;color:#991b1b;}
  .cmp .newx{background:#fef3c7;color:#92400e;}
  /* ── 응시 이력 (최대 3회) ── */
  .at-wrap{background:#f8fafc;border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:10px;}
  .at-h{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;font-weight:800;color:var(--navy);margin-bottom:8px;}
  .at-h .cap{font-weight:700;color:var(--muted);font-size:11px;}
  .at-list{display:flex;gap:8px;flex-wrap:wrap;}
  .at-card{flex:1;min-width:118px;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:9px 11px;cursor:pointer;transition:.12s;text-align:left;}
  .at-card:hover{border-color:var(--orange);transform:translateY(-1px);box-shadow:0 4px 12px rgba(16,24,40,.08);}
  .at-card .n{font-size:10.5px;font-weight:800;color:var(--muted);}
  .at-card .s{font-size:19px;font-weight:900;color:var(--navy);line-height:1.2;}
  .at-card .s small{font-size:11px;font-weight:700;color:var(--muted);}
  .at-card .d{font-size:10px;color:#9aa4b2;margin-top:1px;}
  .at-card.empty{border-style:dashed;background:#fbfcfe;cursor:default;opacity:.7;}
  .at-card.empty:hover{transform:none;box-shadow:none;border-color:var(--line);}
  .at-card.empty .s{color:#cbd5e1;font-size:15px;}
  .at-delta{font-size:10.5px;font-weight:800;margin-top:2px;}
  .at-delta.up{color:var(--ok);} .at-delta.down{color:var(--danger);} .at-delta.same{color:#9aa4b2;}

  /* ── 지난 응시 대비 변화 (강화) ── */
  .chg{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:14px;box-shadow:0 4px 14px rgba(16,24,40,.05);}
  .chg-h{font-size:14px;font-weight:900;color:var(--navy);margin-bottom:3px;}
  .chg-s{font-size:11.5px;color:var(--muted);margin-bottom:12px;}
  .chg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  @media(max-width:620px){ .chg-grid{grid-template-columns:1fr;} }
  .chg-box{border-radius:12px;padding:12px;border:1px solid;}
  .chg-box .cb-t{font-size:11.5px;font-weight:800;display:flex;align-items:center;gap:5px;}
  .chg-box .cb-n{font-size:26px;font-weight:900;line-height:1.15;margin:3px 0 2px;}
  .chg-box .cb-l{font-size:11px;font-weight:700;line-height:1.5;word-break:keep-all;}
  .chg-box.s1{background:#f0fdf4;border-color:#bbf7d0;} .chg-box.s1 .cb-t,.chg-box.s1 .cb-n{color:#15803d;} .chg-box.s1 .cb-l{color:#3f8b5c;}
  .chg-box.s2{background:#fff1f2;border-color:#fecdd3;} .chg-box.s2 .cb-t,.chg-box.s2 .cb-n{color:#be123c;} .chg-box.s2 .cb-l{color:#a4566a;}
  .chg-box.s3{background:#fffbeb;border-color:#fde68a;} .chg-box.s3 .cb-t,.chg-box.s3 .cb-n{color:#b45309;} .chg-box.s3 .cb-l{color:#9a7038;}
  .chg-trend{display:flex;align-items:flex-end;gap:10px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);}
  .chg-trend .tb{flex:1;text-align:center;}
  .chg-trend .tb .bar{background:#eef1f6;border-radius:7px 7px 4px 4px;position:relative;height:64px;display:flex;align-items:flex-end;overflow:hidden;}
  .chg-trend .tb .bar > i{display:block;width:100%;background:linear-gradient(180deg,#fb923c,#ea580c);border-radius:7px 7px 0 0;}
  .chg-trend .tb.cur .bar > i{background:linear-gradient(180deg,#2a5298,#1e3c72);}
  .chg-trend .tb .v{font-size:12.5px;font-weight:900;color:var(--ink);margin-top:5px;}
  .chg-trend .tb .k{font-size:10px;color:var(--muted);font-weight:700;}

  /* 원장 테이블 */
  .mtable-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:10px;}
  table.mx{border-collapse:collapse;font-size:12px;white-space:nowrap;}
  table.mx th,table.mx td{border:1px solid var(--line);padding:5px 7px;text-align:center;}
  table.mx thead th{background:#f7f9fc;position:sticky;top:0;font-weight:700;font-size:11px;}
  table.mx tbody th{position:sticky;left:0;background:#fff;font-weight:800;z-index:2;}
  table.mx td.ox{cursor:pointer;font-weight:800;width:26px;}
  table.mx td.o{color:#16a34a;}
  table.mx td.x{color:#dc2626;background:#fff1f1;}
  table.mx td.wc{font-weight:800;background:#f7f9fc;}

  /* 편집 폼 */
  textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:13px;font-family:'Pretendard',sans-serif;resize:vertical;}
  .row-inline{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
  .savebar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:11px 14px;display:flex;gap:10px;justify-content:center;align-items:center;z-index:25;flex-wrap:wrap;}
  .savebar .status{font-size:12px;color:var(--muted);}
  .toast{position:fixed;left:50%;bottom:76px;transform:translateX(-50%);background:#2d3436;color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;z-index:60;opacity:0;transition:.25s;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .tabs button{background:#fff;border:1px solid var(--line);padding:9px 14px;border-radius:9px;font-size:13.5px;font-weight:700;color:#555;}
  .tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  .ed-row{display:grid;grid-template-columns:34px 1.2fr 1fr 2fr;gap:6px;align-items:center;margin-bottom:6px;}
  .ed-row .no{font-weight:800;text-align:center;color:var(--muted);font-size:12px;}
  .ed-row input{padding:7px 9px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;width:100%;}
  .ed-row .area{font-size:11px;color:var(--muted);text-align:center;}
  @media(max-width:620px){.ed-row{grid-template-columns:28px 1fr;} .ed-row .area{display:none;}}
  .pill{display:inline-block;font-size:11px;font-weight:700;border-radius:999px;padding:2px 9px;}
  .pill.on{background:#dcfce7;color:#166534;} .pill.off{background:#f1f5f9;color:#64748b;}

  /* ─── 신규: 단계별 분석 ─── */
  .tier-section{border-radius:12px;overflow:hidden;margin:10px 0;}
  .tier-row{display:flex;align-items:center;gap:10px;padding:10px 14px;}
  .tier-row.t27{background:var(--t27bg);border-left:4px solid var(--t27);}
  .tier-row.t34{background:var(--t34bg);border-left:4px solid var(--t34);}
  .tier-row.t42{background:var(--t42bg);border-left:4px solid var(--t42);}
  .tier-badge{font-size:11.5px;font-weight:800;border-radius:6px;padding:3px 8px;min-width:52px;text-align:center;}
  .tier-badge.t27{background:var(--t27);color:#fff;}
  .tier-badge.t34{background:var(--t34);color:#fff;}
  .tier-badge.t42{background:var(--t42);color:#fff;}
  .tier-info{flex:1;}
  .tier-info .ti-label{font-size:12px;color:var(--muted);}
  .tier-info .ti-score{font-size:15px;font-weight:800;}
  .tier-bar-wrap{flex:2;min-width:80px;}
  .tier-bar{height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden;}
  .tier-bar i{display:block;height:100%;border-radius:99px;transition:width .4s;}
  .tier-bar i.t27{background:var(--t27);}
  .tier-bar i.t34{background:var(--t34);}
  .tier-bar i.t42{background:var(--t42);}
  .tier-bar i.low27{background:#93c5fd;}
  .tier-bar i.low34{background:#fdba74;}
  .tier-bar i.low42{background:#fca5a5;}
  .tier-comment{font-size:12px;color:#555;margin-top:6px;padding:7px 10px;background:#f9fafb;border-radius:8px;border-left:3px solid #d1d5db;}

  /* ─── 신규: 점수 추이 그래프 ─── */
  .sparkline-wrap{padding:14px;background:var(--card);border-radius:12px;border:1px solid var(--line);margin:10px 0;}
  .sparkline-wrap h4{font-size:13.5px;font-weight:700;margin-bottom:10px;color:var(--ink);}
  .sparkline-wrap svg{width:100%;overflow:visible;}

<script>
/* =========================================================
 * 지필드 영재교육 · 중급 모의고사 진단 v2
 * 처방 시스템 + 단계별 분석 + 점수 추이 그래프 추가
 * ========================================================= */

const REPO="docssam1/hs-report", FILE="mock-data.js", BRANCH="main";
const SUPA_URL="https://fgahqumaldheqettmvqg.supabase.co";
const SUPA_KEY="sb_publishable_OsjJG92BLMaZrc2jTClt0g_ecdTtf_I";
const D=window.GFIELD_DATA||{students:[]};
/* 시험지 선택: ?set=hw 이면 활용 모의고사, 없으면 중급 */
const SET=((new URLSearchParams(location.search).get('set')||'').toLowerCase()==='hw')?'hw':'mid';
const M=(SET==='hw' ? (window.GFIELD_MOCK_HW||window.GFIELD_MOCK) : window.GFIELD_MOCK);
M.results=M.results||{};
/* Supabase 저장 키: 활용은 hw 접두사를 붙여 중급 결과와 섞이지 않게 함 */
function rkey(r){ return (SET==='hw'?'hw':'')+r; }
const SETNAME=(SET==='hw'?'활용':'중급');
/* 화면의 '중급/활용' 표기를 시험지에 맞게 바꿔 줌 */
function applySetName(){
  if(SETNAME==='중급') return;
  document.title=document.title.replace('중급','활용');
  /* 텍스트 노드를 직접 순회 — 자식 요소가 있는 헤더(.t 등)도 정확히 치환됨 */
  try{
    var w=document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null), n, list=[];
    while(n=w.nextNode()){ if(n.nodeValue && n.nodeValue.indexOf('중급')>=0) list.push(n); }
    list.forEach(function(t){ t.nodeValue=t.nodeValue.split('중급').join('활용'); });
  }catch(e){}
  var intro=document.getElementById('setIntro'); if(intro) intro.textContent=INTRO_HW;
}
const INTRO_HW='활용 모의고사는 배운 사고력을 실제 문제에 적용해 보는 과정입니다. 조건을 정확히 읽고 풀이 방법을 스스로 고르는 연습에 초점을 둡니다. 점수보다 틀린 유형을 이해했는지를 봐 주세요.';
function unkey(k){ return (SET==='hw') ? (String(k).startsWith('hw')?String(k).slice(2):null)
                                        : (String(k).startsWith('hw')?null:String(k)); }
let mode=null, me=null, curRound="1";

/* ─── 세부유형 키워드 매핑 ────────────────────────────── */
function findRx(typeText){
  if(!typeText) return null;
  const t=typeText.toLowerCase();
  for(const rx of PRESCRIPTION){
    if(rx.kw.some(k=>t.includes(k.toLowerCase()))) return rx;
  }
  return null;
}

/* 레벨 예측 (2026년 3월 황소 기준: 경시55/심화44/실력35/일품25.7) */
function levelLabel(score){
  if(score>=55) return {label:'경시반', cls:'level-kyungsi', icon:'🥇'};
  if(score>=44) return {label:'심화반', cls:'level-simhwa', icon:'🥈'};
  if(score>=35) return {label:'실력반', cls:'level-silryeok', icon:'🥉'};
  if(score>=25.7) return {label:'일품반', cls:'level-ilpum', icon:'📘'};
  return {label:'입문반', cls:'level-entry', icon:'📗'};
}

/* 문항별 미니 처방 (오답 상세 아래 삽입) */
function miniRxHTML(typeText){
  const rx=findRx(typeText);
  if(!rx) return '';
  const cats=['시중교재','소마','필즈더클래식','지필드'];
  const clrs=['#eff6ff','#f0fdf4','#fef9f0','#f5f3ff'];
  const icons=['📗','🔵','📙','🟣'];
  let rows='';
  cats.forEach((cat,i)=>{
    const list=(rx.books[cat]||[]);
    if(!list.length) return;
    rows+=`<tr><td style="font-size:11px;font-weight:700;color:#555;white-space:nowrap;background:${clrs[i]};padding:4px 8px">${icons[i]} ${cat}</td><td style="font-size:11.5px;padding:4px 8px">`;
    rows+=list.map(b=>`<b>${esc(b.b)}</b> <span style="color:#6b7280">${esc(b.u)}</span>`).join('<br>');
    rows+='</td></tr>';
  });
  if(!rows) return '';
  let pts='';
  if(rx.pts&&rx.pts.length){
    pts='<div style="margin-top:5px;font-size:11.5px;color:#374151;background:#f9fafb;border-radius:6px;padding:5px 8px">';
    pts+='<b style="color:#92400e">📌 학습 포인트:</b> ';
    pts+=rx.pts.map(p=>`· ${esc(p)}`).join('  ');
    pts+='</div>';
  }
  return `<div style="margin-top:6px;border:1px solid #d1fae5;border-radius:7px;overflow:hidden">
    <div style="font-size:11px;font-weight:700;color:#065f46;background:#d1fae5;padding:3px 8px">📚 연결 교재 (4개 카테고리)</div>
    <table style="width:100%;border-collapse:collapse">${rows}</table>
    ${pts}
  </div>`;
}

/* 전체 약점 처방 섹션 (누적 분석) */
function prescriptionHTML(wl, limit){
  const rxMap={};
  wl.forEach(w=>{
    const rx=findRx(w.type);
    if(!rx) return;
    const key=rx.label;
    if(!rxMap[key]) rxMap[key]={rx:rx,cnt:0,nos:[]};
    rxMap[key].cnt++; rxMap[key].nos.push(w.no);
  });
  const top=Object.values(rxMap).sort((a,b)=>b.cnt-a.cnt).slice(0,limit||6);
  if(!top.length) return '';
  const cats=['시중교재','소마','필즈더클래식','지필드'];
  const catClrs=['#eff6ff','#f0fdf4','#fef9f0','#f5f3ff'];
  const catIcons=['📗','🔵','📙','🟣'];
  let h='<div class="rx-section"><h4>🎒 약점 유형별 처방 교재 — 4개 카테고리 연결</h4>';
  top.forEach(({rx,cnt,nos})=>{
    h+=`<div class="rx-item">
      <div class="rx-type">${esc(rx.label)}<span class="rx-star">${rx.star}</span><span class="rx-cnt">오답 ${cnt}회 · ${nos.slice(0,5).join('·')}${nos.length>5?'…':''}번</span></div>`;
    /* 교재 4분류 테이블 */
    let hasAny=false;
    cats.forEach((cat,i)=>{
      const list=(rx.books[cat]||[]);
      if(!list.length) return;
      hasAny=true;
      h+=`<div style="display:flex;gap:6px;align-items:baseline;margin:3px 0;font-size:12px">
        <span style="background:${catClrs[i]};border-radius:4px;padding:1px 6px;font-size:11px;font-weight:700;white-space:nowrap">${catIcons[i]} ${cat}</span>
        <span>${list.map(b=>`<b class="bname">${esc(b.b)}</b> <span class="bunit">${esc(b.u)}</span>`).join(' / ')}</span>
      </div>`;
    });
    if(!hasAny) h+='<div style="font-size:12px;color:#9ca3af">확인 필요</div>';
    /* 학습 포인트 */
    if(rx.pts&&rx.pts.length){
      h+='<div style="margin-top:5px;font-size:11.5px;color:#374151;background:#f0fdf4;border-radius:6px;padding:5px 8px">';
      h+='<b style="color:#166534">📌 추가 학습 포인트:</b> ';
      h+=rx.pts.map(p=>`· ${esc(p)}`).join('  ');
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  return h;
}

/* ─── 기존 유틸 ─────────────────────────────────────────── */
function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2400); }
function bp(no){ return M.blueprint.find(b=>b.no===no)||{no:no,area:'',pts:0}; }
function roundKeys(){ return Object.keys(M.rounds).sort((a,b)=>+a-+b); }
function roundItems(r){ return (M.rounds[r]&&M.rounds[r].items)||[]; }
function itemOf(r,no){ return roundItems(r).find(i=>i.no===no)||{no:no,type:'',answer:'',comment:''}; }
function Q(){ return M.questions||30; }
function givenName(n){ return n&&n.length>=2? n.slice(1):n; }
function latexToPlain(s){ return (s||'').replace(/\$(.*?)\$/g, function(m,x){   var t=x.replace(/\\d?frac\s*\{([^{}]*)\}\s*\{([^{}]*)\}/g, function(_,a,b){ return ' '+a+'/'+b; });   return t.replace(/[{}]/g,'').replace(/\s+/g,' ').trim(); }); }
function vidUrl(r,t,ov){ var v=ov||((M.rounds[r]&&M.rounds[r].video)||''); if(!v) return ''; if(t&&+t>0){ v += (v.indexOf('?')>=0?'&':'?')+'t='+Math.floor(t); } return v; }
function openVid(r,t,ov){ var u=vidUrl(r,t,ov); if(u) window.open(u,'_blank','noopener'); else toast('등록된 영상이 없어요.'); }
function printAnswers(r){
  var items=roundItems(r); if(!items.length){ toast('등록된 정답이 없어요.'); return; }
  var rows=''; for(var n=1;n<=Q();n++){ var it=itemOf(r,n); var b=bp(n); rows+='<tr><td>'+n+'</td><td>'+esc(b.area)+'</td><td>'+b.pts+'</td><td>'+esc(latexToPlain(it.answer))+'</td></tr>'; }
  var w=window.open('','_blank'); if(!w) return;
  var ti=esc((M.rounds[r].title||r+'회'));
  w.document.write('<html><head><meta charset="utf-8"><title>'+ti+' 정답</title><style>body{font-family:sans-serif;padding:20px;}h2{margin:0 0 10px;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #999;padding:6px 8px;font-size:13px;text-align:center;}th{background:#eee;}td:last-child{text-align:left;font-weight:700;}</style></head><body><h2>중급 모의고사 '+ti+' 정답</h2><table><thead><tr><th>번호</th><th>영역</th><th>배점</th><th>정답</th></tr></thead><tbody>'+rows+'</tbody></table><scr'+'ipt>setTimeout(function(){window.print();},350);</scr'+'ipt></body></html>');
  w.document.close();
}

/* ─── Supabase ──────────────────────────────────────────── */
async function supaUpsert(student,r,ox,source){
  const oxs=ox.join?ox.join(''):ox; const sc=scoreOf(oxs.split(''));
  try{
    const res=await fetch(SUPA_URL+"/rest/v1/mock_results",{method:"POST",headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY,"Content-Type":"application/json",Prefer:"resolution=merge-duplicates"},body:JSON.stringify({student:student,round:rkey(r),ox:oxs,score:sc.score,wrong:sc.wrong,source:source||'parent'})});
    if(res.ok) return true;
    queuePending(student,r,oxs,source); return false;
  }catch(e){ queuePending(student,r,oxs,source); return false; }
}
/* ─ 전송 실패분 자동 재시도 큐 (학부모가 따로 할 일 없음) ─ */
const PQ_KEY='gfield_pending_results';
function pendingList(){ try{ return JSON.parse(localStorage.getItem(PQ_KEY)||'[]'); }catch(e){ return []; } }
function pendingSave(a){ try{ localStorage.setItem(PQ_KEY, JSON.stringify(a.slice(-30))); }catch(e){} }
function queuePending(student,r,oxs,source){
  const a=pendingList().filter(x=>!(x.student===student&&String(x.r)===String(r)));
  a.push({student:student,r:r,ox:oxs,source:source||'parent',at:Date.now()});
  pendingSave(a);
}
async function flushPending(){
  const a=pendingList(); if(!a.length) return;
  const left=[];
  for(const it of a){
    const sc=scoreOf(it.ox.split(''));
    let ok=false;
    try{
      const res=await fetch(SUPA_URL+"/rest/v1/mock_results",{method:"POST",headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY,"Content-Type":"application/json",Prefer:"resolution=merge-duplicates"},body:JSON.stringify({student:it.student,round:rkey(it.r),ox:it.ox,score:sc.score,wrong:sc.wrong,source:it.source})});
      ok=res.ok;
    }catch(e){ ok=false; }
    if(!ok) left.push(it);
  }
  pendingSave(left);
  if(a.length && !left.length){ try{ toast('이전에 저장하지 못한 결과가 전송됐어요 ✅'); }catch(e){} }
}
/* 페이지 로드·온라인 복귀 시 자동 재시도 */
window.addEventListener('online', function(){ flushPending(); });
async function supaLoadAll(){
  try{
    const r=await fetch(SUPA_URL+"/rest/v1/mock_results?select=student,round,ox,source,updated_at",{headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY}});
    if(!r.ok) return false;
    const rows=await r.json();
    rows.forEach(row=>{ if(!row.ox||row.ox.length!==Q()) return; const rn=unkey(row.round); if(rn===null||!M.rounds[rn]) return; M.results[row.student]=M.results[row.student]||{}; M.results[row.student][rn]=[{ox:row.ox.split(''),ts:(row.updated_at||'').slice(0,10),by:row.source||'db'}]; });
    return true;
  }catch(e){ return false; }
}

/* ─── 로그인 ─────────────────────────────────────────────── */
function enter(){
  const v=document.getElementById('pw').value.trim();
  if(!v){ return; }
  if(v.toLowerCase()==='docssam'){ mode='teacher'; me='원장'; startTeacher(); return; }
  if(!(D.students||[]).includes(v)){ document.getElementById('gate-err').textContent='등록된 학생만 입장할 수 있어요.'; return; }
  mode='parent'; me=v; try{ localStorage.setItem('gfield_student',v); }catch(e){}
  startParent();
  if(window._pendingRound && M.rounds[window._pendingRound]){ openMark(window._pendingRound); window._pendingRound=null; }
}
function boot(){ try{applySetName();}catch(e){}
  setTimeout(function(){ try{ flushPending(); }catch(e){} }, 1500);
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('h-sub').textContent = mode==='teacher'?'원장 분석':(me+' 학생');
}

/* ─── 채점 계산 ──────────────────────────────────────────── */
function blankOx(){ const a=[]; for(let i=0;i<Q();i++) a.push('O'); return a; }
function scoreOf(ox){ let s=0,wrong=0; for(let n=1;n<=Q();n++){ if(ox[n-1]==='X') wrong++; else s+=bp(n).pts; } return {score:Math.round(s*10)/10, wrong:wrong, correct:Q()-wrong}; }
/* 영역은 회차별 실제 문항(item.area)을 우선 사용. 없으면 blueprint 영역. */
function areaOf(r,n){ const it=itemOf(r,n); return (it&&it.area)||bp(n).area||''; }
function areaStats(ox,r){ const map={}; M.areas.forEach(a=>map[a]={tot:0,got:0,cnt:0,ok:0}); for(let n=1;n<=Q();n++){ const b=bp(n); const a=(r!=null?areaOf(r,n):b.area); if(!map[a]) map[a]={tot:0,got:0,cnt:0,ok:0}; map[a].tot+=b.pts; map[a].cnt++; if(ox[n-1]!=='X'){ map[a].got+=b.pts; map[a].ok++; } } return map; }
function wrongList(r,ox){ const out=[]; for(let n=1;n<=Q();n++){ if(ox[n-1]==='X'){ const it=itemOf(r,n); const b=bp(n); out.push({no:n, area:b.area, pts:b.pts, type:it.type, comment:it.comment, t:it.t||0, vid:it.video||''}); } } return out; }
function typeComment(it){ if(it.comment&&it.comment.trim()) return it.comment; if(it.type) return "'"+it.type+"' 유형이에요. 풀이 강의를 보며 방법을 익힌 뒤, 며칠 뒤 새 종이에 스스로 다시 풀어보세요."; return "풀이 강의를 보며 방법을 익힌 뒤 스스로 다시 풀어보세요."; }

/* ─── 결과 저장 ──────────────────────────────────────────── */
function attemptsOf(student,r){ M.results[student]=M.results[student]||{}; M.results[student][r]=M.results[student][r]||[]; return M.results[student][r]; }
function latestOx(student,r){ const a=attemptsOf(student,r); return a.length? a[a.length-1].ox : null; }
function pushAttempt(student,r,ox,by){ const a=attemptsOf(student,r); a.push({ox:ox.slice(), ts:new Date().toISOString().slice(0,10), by:by||'parent'}); while(a.length>3) a.shift(); }
function lsKey(){ return 'gfield_mock_'+me; }
function loadLocal(){ try{ const j=localStorage.getItem(lsKey()); if(j){ M.results[me]=JSON.parse(j); } }catch(e){} }
function saveLocal(){ try{ localStorage.setItem(lsKey(), JSON.stringify(M.results[me]||{})); }catch(e){} }

/* 코치 메시지 (랜덤) */
function coachMsg(isParent){
  const arr = isParent? (D.vip&&D.vip.coachParent)||[] : (D.vip&&D.vip.coach)||[];
  if(!arr.length) return '';
  return arr[Math.floor(Math.random()*arr.length)];
}

  markOx = prev? prev.slice() : blankOx();
  renderMark();
}

  let attemptBtns='';

      }else{
        cards+=`<div class="at-card empty"><div class="n">${i+1}회 응시</div><div class="s">–</div><div class="d">아직 기록 없음</div></div>`;

    attemptBtns=`<div class="at-wrap"><div class="at-h"><span>📗 응시 기록 (${at.length}/3회)</span><span class="cap">한 회차당 3번까지 응시할 수 있어요 · 카드를 누르면 그때 기록을 불러옵니다</span></div><div class="at-list">${cards}</div></div>`;
  }
  const hint='<div class="mk-guide"><div class="g1">집에서 푼 시험지를 채점한 뒤, <b>틀린 문제의 번호만</b> 눌러 주세요.</div><div class="g2">번호를 누르면 <span class="exq">7</span> → <span class="exq x">✕</span> 로 바뀝니다. 맞은 문제는 그대로 두시고, 잘못 눌렀으면 한 번 더 누르면 취소됩니다.</div><div class="g3">칸 테두리 색은 배점입니다 — 🔴 4.2점 · 🟡 3.4점 · ⚪ 2.7점</div></div>';
  document.getElementById('main').innerHTML=`
    <div class="mk-hero">
      <div class="mk-hero-top">
        <button class="btn ghostw" onclick="renderRoundPick()">‹ 회차 선택</button>
        <span class="mk-badge">GFIELD 진단 시스템</span>
      </div>
      <h2 class="mk-title">${esc(M.rounds[r].title||r+'회')} · ${SETNAME} 모의고사</h2>
      <div class="mk-sub">틀린 문제만 체크하면 <b>약점 영역</b>과 <b>유형별 처방 교재</b>가 바로 나옵니다.</div>
      <div class="mk-steps">
        <div class="st done"><i>1</i><span>집에서 시험지 풀기</span></div>
        <div class="st now"><i>2</i><span>채점 · 오답 체크</span></div>
        <div class="st"><i>3</i><span>결과 분석 받기</span></div>
      </div>
    </div>
    <div class="card">
      ${hint}${attemptBtns}
      <div class="mk-count"><span>1 ~ ${Q()}번 중 <b>틀린 번호</b>를 눌러 주세요</span><span>체크한 오답 <span class="n" id="mk-cnt">${sc.wrong}</span>개</span></div>
      <div class="qgrid">${g}</div>
      <div class="mk-score">
        <div class="sc-row">
          <div class="sc-main"><span class="v" id="mk-score">${sc.score}</span><span class="u">점 / 100점</span></div>
          <div class="sc-side">
            <div><div class="k">맞은 개수</div><div class="w" style="color:var(--ok)">${sc.correct}<span style="font-size:12px;color:#98a2b3"> / ${Q()}</span></div></div>
            <div><div class="k">틀린 개수</div><div class="w" style="color:var(--danger)" id="mk-wrong">${sc.wrong}</div></div>
          </div>
        </div>
        <div class="mk-gauge"><i style="width:${sc.score}%"></i></div>
      </div>
      <button class="mk-submit" onclick="submitAttempt()">결과 제출하고 분석 보기 →</button>
      <div class="mk-info">

        <div class="mi-grid">
          <div class="mi"><b><span class="ic">🎯</span>영역별 약점</b>도형 · 식의 계산 · 수와 규칙찾기 · 경우의 수 중 어느 영역이 부족한지 점수로 보여드립니다.</div>
          <div class="mi"><b><span class="ic">💊</span>유형별 처방</b>틀린 문항마다 어떤 유형인지 알려드리고, 보완할 교재와 학습 방법을 연결해 드립니다.</div>
          <div class="mi"><b><span class="ic">📈</span>성장 추이</b>회차를 거듭할수록 반복되는 오답 패턴과 향상도를 누적해서 확인할 수 있습니다.</div>
          <div class="mi"><b><span class="ic">📨</span>원장님 자동 전송</b>제출과 동시에 결과가 전달되어, 수업에서 약점 유형을 바로 다뤄드립니다.</div>
        </div>
      </div>
    </div>`;
}
function toggleQ(n){ markOx[n-1]= markOx[n-1]==='X'?'O':'X'; renderMark(); }
function loadAttempt(i){ const a=attemptsOf(me,curRound); if(a[i]){ markOx=a[i].ox.slice(); renderMark(); } }
async function submitAttempt(){
  const at=attemptsOf(me,curRound);
  if(at.length>=3){ if(!confirm('이미 3회 응시했어요. 가장 오래된 기록을 지우고 새로 저장할까요?')) return; }
  const prev = at.length? at[at.length-1].ox.slice() : null;
  pushAttempt(me,curRound,markOx,'parent'); saveLocal();
  const ok=await supaUpsert(me,curRound,markOx,'parent');
  toast(ok?'제출 완료 · 원장님께 전송됐어요 ✅':'제출 완료 · 저장했어요. 전송은 자동으로 다시 시도합니다');
  renderReport(me,curRound,prev,ok);
}

/* ─── 학부모용 분석 리포트 (전면 개선) ──────────────────── */
function renderReport(student,r,prevOx,sent){
  /* 제출 직후가 아니어도(다시 열람 시) 직전 응시를 자동으로 찾아 비교 */
  if(!prevOx){ const _a=attemptsOf(student,r); if(_a.length>=2) prevOx=_a[_a.length-2].ox; }
  const at=attemptsOf(student,r);
  const ox=at[at.length-1].ox;
  const sc=scoreOf(ox);
  const as=areaStats(ox,r);
  const wl=wrongList(r,ox);
  const tiers=scoreByTier(ox);
  const lv=levelLabel(sc.score);
  const gName=givenName(student);

  /* ── 헤더: 점수 카드 ── */
  let h=`<div class="card">
    <div class="row-inline" style="justify-content:space-between;margin-bottom:6px">
      <div class="row-inline" style="gap:6px;margin-bottom:0">
        <button class="btn gray sm" onclick="renderRoundPick()">‹ 회차 선택</button>
        <b>${esc(gName)} · ${esc(M.rounds[r].title||r+'회')} 분석 결과</b>
      </div>
      <div class="row-inline" style="gap:6px;margin-bottom:0">
        ${sent!==undefined?`<span class="pill ${sent?'on':'off'}">${sent?'원장님께 전송됨':'저장됨 · 전송 대기중'}</span>`:''}
        <button class="btn navy sm" onclick="printReport('${esc(M.rounds[r].title||r+'회')} 진단 결과')">🖨 인쇄</button>
      </div>
    </div>
    <div class="scorebar">
      <div><div class="big">${sc.score}</div><div class="lbl">점 / 100점</div></div>
      <div><div class="big" style="color:#334">${sc.correct} / ${Q()}</div><div class="lbl">맞은 개수</div></div>
      <div><div class="big" style="color:#dc2626">${sc.wrong}</div><div class="lbl">틀린 개수</div></div>
      <div><div class="big" style="color:#334">${at.length}<span style="font-size:15px;color:#889">회</span></div><div class="lbl">응시</div></div>
    </div>
    <div class="row-inline" style="margin-top:8px">
      <span class="level-badge ${lv.cls}">${lv.icon} 참고 지표: <b>${lv.label}</b> 점수대</span>
      <span class="hint" style="margin:0;font-size:11px">황소 실제 시험 기준(경시55·심화44·실력35·일품25.7) · 모의고사와는 다를 수 있어요</span>
    </div>
    <div class="mock-note">
      <b>📌 중급 모의고사는 이런 과정입니다</b><span id="setIntro">
      중급 모의고사는 가정에서 학습하며 파이널 대비에 익숙하게 만들기 위한 과정입니다. 이미 배웠던 사고력을 복습하고 지문에서의 조건을 놓치지 않는 연습을 합니다. 계산으로 가능한 실제 황소 기출 유형을 경험할 수 있지만 아직은 정확한 기준이라고 할 수 없습니다.
      </span><em>반드시 점수보다는 발전하는 모습을 봐주세요.</em>
    </div>
  </div>`;

  /* ── 이전 대비 변화 ── */
  if(prevOx){
    let solved=[],still=[],neo=[];
    for(let n=1;n<=Q();n++){
      const p=prevOx[n-1]==='X', c=ox[n-1]==='X';
      if(p&&!c) solved.push(n); else if(p&&c) still.push(n); else if(!p&&c) neo.push(n);
    }
    const _at=attemptsOf(student,r);
    let trend='';
    if(_at.length>=2){
      const scs=_at.map(a=>scoreOf(a.ox).score);
      const mx=Math.max(100,...scs);
      let bars='';
      for(let i=0;i<3;i++){
        if(scs[i]==null){ bars+=`<div class="tb"><div class="bar"></div><div class="v" style="color:#cbd5e1">–</div><div class="k">${i+1}회</div></div>`; continue; }
        const hgt=Math.max(4,Math.round(scs[i]/mx*64));
        bars+=`<div class="tb ${i===scs.length-1?'cur':''}"><div class="bar"><i style="height:${hgt}px"></i></div><div class="v">${scs[i]}점</div><div class="k">${i+1}회</div></div>`;
      }
      trend=`<div class="chg-trend">${bars}</div>`;
    }
    h+=`<div class="chg">
      <div class="chg-h">📊 지난 응시 대비 변화</div>
      <div class="chg-s">같은 회차를 다시 풀었을 때, 무엇이 해결되고 무엇이 남았는지 보여드립니다.</div>
      <div class="chg-grid">
        <div class="chg-box s1"><div class="cb-t">✅ 해결된 문제</div><div class="cb-n">${solved.length}<span style="font-size:14px">개</span></div><div class="cb-l">${solved.length?solved.join(', ')+'번':'아직 없어요'}</div></div>
        <div class="chg-box s2"><div class="cb-t">🔁 반복 오답</div><div class="cb-n">${still.length}<span style="font-size:14px">개</span></div><div class="cb-l">${still.length?still.join(', ')+'번 — 집중 보완이 필요해요':'반복 오답이 없어요 👏'}</div></div>
        <div class="chg-box s3"><div class="cb-t">⚠️ 새로 틀린 문제</div><div class="cb-n">${neo.length}<span style="font-size:14px">개</span></div><div class="cb-l">${neo.length?neo.join(', ')+'번 — 실수인지 확인해 주세요':'새로 틀린 문제가 없어요'}</div></div>
      </div>
      ${trend}
    </div>`;
  }

  /* ── 단계별 분석 ── */
  h+=`<div class="card">
    <h3 style="margin-bottom:10px">📊 단계별 정답률</h3>
    ${tierHTML(tiers, tierComment(tiers))}
  </div>`;

  /* ── 점수 추이 (다회 응시 시) ── */
  const spark=svgSparkline(student);
  if(spark) h+=`<div class="card" style="padding:12px 14px">${spark}</div>`;

  /* ── 영역별 수행률 ── */
  h+=`<div class="card"><h3>영역별 수행률</h3>`;
  M.areas.forEach(a=>{
    const s=as[a]||{tot:0,got:0,cnt:0,ok:0};
    const pct=s.tot?Math.round(s.got/s.tot*100):0;
    h+=`<div class="area-row">
      <div class="at"><b>${esc(a)}</b><span>${s.ok}/${s.cnt}문항 · ${pct}%</span></div>
      <div class="abar"><i class="${pct>=70?'high':pct<50?'low':''}" style="width:${pct}%"></i></div>
    </div>`;
  });
  h+='</div>';

  /* ── 오답 문항 상세 ── */
  const hasVid=(M.rounds[r]&&M.rounds[r].video);
  h+=`<div class="card">
    <div class="row-inline" style="justify-content:space-between;margin-bottom:6px">
      <h3 style="margin:0">📋 오답 문항 상세 분석</h3>
      ${hasVid?`<button class="btn navy sm" onclick="openVid('${r}',0)">▶ 전체 풀이 영상</button>`:''}
    </div>`;
  if(!wl.length){
    h+='<div class="hint">틀린 문항이 없어요. 훌륭합니다! 🎉</div>';
  } else {
    h+='<div class="hint">문항을 누르면 해당 풀이 영상으로 바로 이동해요.</div>';
    wl.forEach(w=>{
      const it=itemOf(r,w.no);
      const tierCls=w.pts>=4?'border-color:#fca5a5':w.pts>=3?'border-color:#fde68a':'';
      const canV=!!(w.vid||hasVid);
      const clk=canV?`onclick="openVid('${r}',${w.t},'${esc(w.vid||'')}')" style="cursor:pointer"`:'';
      h+=`<div class="wt-item" ${clk} style="${tierCls}">
        <div class="wt-h">
          <span class="no">${w.no}번</span>${esc(w.type||'(유형 준비중)')}
          <span class="wt-a"> · ${esc(w.area)} · ${w.pts}점</span>
          ${canV?'<span class="vjump">▶ 영상</span>':''}
        </div>
        <div class="wt-c">${esc(typeComment(it))}</div>
        ${miniRxHTML(w.type)}
      </div>`;
    });
  }
  h+='</div>';

  /* ── 처방 교재 ── */
  const rxHtml=prescriptionHTML(wl,5);
  if(rxHtml) h+=`<div class="card" style="padding:0;border:none;background:transparent">${rxHtml}</div>`;

  /* ── 코치 메시지 ── */
  const msg=coachMsg(false);
  const msgP=coachMsg(true);
  if(msg||msgP){
    h+=`<div class="coach-msg">
      <div class="coach-icon">💬</div>
      ${msg?`<div class="coach-text">${esc(msg)}</div>`:''}
      ${msgP?`<div class="coach-sub">📌 학부모님께 — ${esc(msgP)}</div>`:''}
    </div>`;
  }

  /* 전송이 지연되면 자동으로 재시도합니다 (학부모가 따로 할 일 없음) */
  if(sent===false){
    h+=`<div class="card" style="padding:12px 14px;background:#f8fafc">
      <div class="hint" style="margin:0">💾 결과가 이 기기에 안전하게 저장됐어요. 인터넷 연결이 회복되면 <b>원장님께 자동으로 전송</b>됩니다. 따로 하실 일은 없어요.</div>
    </div>`;
  }

  document.getElementById('main').innerHTML=h;
  try{ flushPending(); }catch(e){}
}



/* ─── 진단지 인쇄 ─────────────────────────────────────── */
function printReport(subtitle){
  const d=new Date();
  const ymd=d.getFullYear()+'. '+(d.getMonth()+1)+'. '+d.getDate();
  const t=document.getElementById('phTitle');
  const m=document.getElementById('phMeta');
  if(t) t.textContent=(givenName(me)||'')+' · '+(subtitle||(SETNAME+' 모의고사 진단 결과'));
  if(m) m.innerHTML='지필드 영재교육 &nbsp;G!FIELD<br>출력일 '+ymd;
  window.print();
}

/* ─── 학부모용 전체 누적 분석 ────────────────────────────── */
function renderCumulative(){
  const student=me;
  const rs=roundKeys().filter(r=>latestOx(student,r));
  if(!rs.length){ toast('아직 응시 기록이 없어요.'); return; }

  const areaAgg={}; M.areas.forEach(a=>areaAgg[a]={tot:0,got:0,cnt:0,ok:0});
  const tierAgg={27:{q:0,ok:0,max:0},34:{q:0,ok:0,max:0},42:{q:0,ok:0,max:0}};
  const typeAgg={};              /* 세부유형별 오답 */
  const rxAgg={};                /* 처방유형별 오답 */
  const scores=[]; const allWrong=[];

  rs.forEach(r=>{
    const ox=latestOx(student,r);
    const as=areaStats(ox,r), t=scoreByTier(ox);
    M.areas.forEach(a=>{ const x=as[a]||{tot:0,got:0,cnt:0,ok:0};
      areaAgg[a].tot+=x.tot; areaAgg[a].got+=x.got; areaAgg[a].cnt+=x.cnt; areaAgg[a].ok+=x.ok; });
    [27,34,42].forEach(k=>{ if(t[k]){ tierAgg[k].q+=t[k].q; tierAgg[k].ok+=t[k].ok; tierAgg[k].max+=t[k].max; } });
    scores.push({r:r, sc:scoreOf(ox).score, lbl:M.rounds[r].title||r+'회'});
    wrongList(r,ox).forEach(w=>{
      allWrong.push(Object.assign({round:r}, w));
      const k=w.type||('('+w.area+')');
      (typeAgg[k]=typeAgg[k]||{n:0,at:[]}).n++; typeAgg[k].at.push(M.rounds[r].title||r+'회');
      const rx=findRx(w.type);
      if(rx){ (rxAgg[rx.label]=rxAgg[rx.label]||{n:0,rx:rx}).n++; }
    });
  });

  const gName=givenName(student);
  const avg=Math.round(scores.reduce((a,s)=>a+s.sc,0)/rs.length*10)/10;
  const best=Math.max(...scores.map(s=>s.sc));
  const last=scores[scores.length-1].sc;
  const lv=levelLabel(avg), lvB=levelLabel(best);
  const totQ=rs.length*Q(), totW=allWrong.length;

  let h=`<div class="card">
    <div class="row-inline" style="gap:6px;margin-bottom:8px">
      <button class="btn gray sm" onclick="renderRoundPick()">‹ 회차 선택</button>
      <b>${esc(gName)} · 전체 누적 분석</b>
      <span style="flex:1"></span>
      <button class="btn navy sm" onclick="printReport('전체 누적 분석')">🖨 인쇄</button>
    </div>
    <div class="scorebar">
      <div><div class="big">${avg}</div><div class="lbl">평균 점수</div></div>
      <div><div class="big" style="color:#16a34a">${best}</div><div class="lbl">최고 점수</div></div>
      <div><div class="big" style="color:#334">${last}</div><div class="lbl">최근 점수</div></div>
      <div><div class="big" style="color:#334">${rs.length}<span style="font-size:15px;color:#889">회</span></div><div class="lbl">응시 회차</div></div>
    </div>
    <div class="row-inline" style="margin-top:8px">
      <span class="level-badge ${lv.cls}">${lv.icon} 평균 → <b>${lv.label}</b> 점수대</span>
      <span class="level-badge ${lvB.cls}">${lvB.icon} 최고 → <b>${lvB.label}</b> 점수대</span>
      <span class="hint" style="margin:0;font-size:11px">황소 실제 시험 기준 · 참고용</span>
    </div>
    <div class="hint" style="margin:8px 0 0">총 ${totQ}문항 중 ${totW}문항 오답 · 누적 정답률 ${Math.round((totQ-totW)/totQ*100)}%</div>
    <div class="mock-note">
      <b>📌 ${SETNAME} 모의고사는 이런 과정입니다</b>
      ${SETNAME} 모의고사는 가정에서 학습하며 파이널 대비에 익숙하게 만들기 위한 과정입니다. 이미 배웠던 사고력을 복습하고 지문에서의 조건을 놓치지 않는 연습을 합니다. 계산으로 가능한 실제 황소 기출 유형을 경험할 수 있지만 아직은 정확한 기준이라고 할 수 없습니다.
      <em>반드시 점수보다는 발전하는 모습을 봐주세요.</em>
    </div>
  </div>`;

  /* 점수 추이 */
  const spark=svgSparkline(student);
  if(spark) h+=`<div class="card" style="padding:12px 14px">${spark}</div>`;

  /* 단계별 누적 */
  h+=`<div class="card"><h3 style="margin-bottom:10px">📊 단계별 누적 정답률</h3>
    ${tierHTML(tierAgg, tierComment(tierAgg))}</div>`;

  /* 영역별 누적 */
  h+=`<div class="card"><h3>영역별 누적 수행률</h3>`;
  M.areas.forEach(a=>{
    const s=areaAgg[a]; const pct=s.tot?Math.round(s.got/s.tot*100):0;
    h+=`<div class="area-row">
      <div class="at"><b>${esc(a)}</b><span>${s.ok}/${s.cnt}문항 · ${pct}%</span></div>
      <div class="abar"><i class="${pct>=70?'high':pct<50?'low':''}" style="width:${pct}%"></i></div>
    </div>`;
  });
  h+='</div>';

  /* 반복 오답 유형 TOP */
  const rep=Object.entries(typeAgg).sort((a,b)=>b[1].n-a[1].n);
  const rep2=rep.filter(e=>e[1].n>=2);
  h+=`<div class="card"><h3>🔁 반복해서 틀린 유형</h3>`;
  if(!rep2.length){
    h+='<div class="hint">두 번 이상 반복해서 틀린 유형이 없어요. 안정적입니다! 🎉</div>';
  }else{
    h+='<div class="hint">같은 유형을 2회 이상 틀렸어요. 여기부터 잡으면 점수가 가장 많이 오릅니다.</div>';
    rep2.slice(0,8).forEach(([k,v])=>{
      h+=`<div class="wt-item" style="border-color:#fca5a5">
        <div class="wt-h"><span class="no" style="background:#dc2626">${v.n}회</span>${esc(k)}
        <span class="wt-a"> · ${esc(v.at.join(', '))}</span></div>
        ${miniRxHTML(k)}
      </div>`;
    });
  }
  h+='</div>';

  /* 누적 처방 교재 (오답 많은 순) */
  const rxTop=Object.values(rxAgg).sort((a,b)=>b.n-a.n).slice(0,6);
  if(rxTop.length){
    h+=`<div class="rx-section"><h4>🎒 지금 이 순서로 공부하세요 (누적 오답 기준)</h4>`;
    const cats=['시중교재','소마','필즈더클래식','지필드'];
    const clrs=['#eff6ff','#f0fdf4','#fef9f0','#f5f3ff'];
    const icons=['📗','🔵','📙','🟣'];
    rxTop.forEach((e,i)=>{
      const r=e.rx;
      h+=`<div class="rx-item">
        <div class="rx-type"><span style="background:#1F3864;color:#fff;border-radius:5px;padding:1px 7px;font-size:11px;margin-right:5px">${i+1}순위</span>${esc(r.label)}<span class="rx-star">${r.star}</span><span class="rx-cnt">누적 오답 ${e.n}회</span></div>`;
      cats.forEach((c,j)=>{
        const l=r.books[c]||[];
        if(!l.length) return;
        h+=`<div style="display:flex;gap:6px;align-items:baseline;margin:3px 0;font-size:12px">
          <span style="background:${clrs[j]};border-radius:4px;padding:1px 6px;font-size:11px;font-weight:700;white-space:nowrap">${icons[j]} ${c}</span>
          <span>${l.map(b=>`<b class="bname">${esc(b.b)}</b> <span class="bunit">${esc(b.u)}</span>`).join(' / ')}</span>
        </div>`;
      });
      if(r.pts&&r.pts.length){
        h+='<div style="margin-top:5px;font-size:11.5px;color:#374151;background:#f0fdf4;border-radius:6px;padding:5px 8px">';
        h+='<b style="color:#166534">📌 학습 포인트:</b> '+r.pts.map(p=>'· '+esc(p)).join('  ')+'</div>';
      }
      h+='</div>';
    });
    h+='</div>';
  }

  /* 회차별 요약 */
  h+=`<div class="card"><h3>📋 회차별 요약</h3><div class="score-trend-grid">`;
  scores.forEach(s=>{
    const l=levelLabel(s.sc);
    const w=allWrong.filter(x=>x.round===s.r).length;
    h+=`<div class="score-chip" onclick="openMark('${s.r}')" style="cursor:pointer">
      <div class="sc-rnd">${esc(s.lbl)}</div><div class="sc-val">${s.sc}</div>
      <div style="font-size:10px;color:#6b7280">${l.icon}${l.label} · 오답${w}</div></div>`;
  });
  h+='</div><div class="hint" style="margin:8px 0 0">회차를 누르면 해당 회차 상세로 이동해요.</div></div>';

  /* 코치 메시지 */
  const msg=coachMsg(false), msgP=coachMsg(true);
  if(msg||msgP){
    h+=`<div class="coach-msg"><div class="coach-icon">💬</div>
      ${msg?`<div class="coach-text">${esc(msg)}</div>`:''}
      ${msgP?`<div class="coach-sub">📌 학부모님께 — ${esc(msgP)}</div>`:''}</div>`;
  }

  document.getElementById('main').innerHTML=h;
  window.scrollTo(0,0);
}

let tSel=''; let tTab='student';

async function reloadResults(){ const st=document.getElementById('save-status'); st.textContent='불러오는 중…'; const ok=await supaLoadAll(); st.textContent=ok?'✅ 최신 결과 불러옴':'불러오기 실패'; renderTeacher(); }

function tAnalysisHTML(student){
  const rs=roundKeys().filter(r=>latestOx(student,r));
  if(!rs.length) return '<div class="card"><div class="hint">아직 응시 기록이 없습니다.</div></div>';

  const areaAgg={}; M.areas.forEach(a=>areaAgg[a]={tot:0,got:0});
  const tierAgg={27:{q:0,ok:0},34:{q:0,ok:0},42:{q:0,ok:0}};
  const typeCnt={}; const scores=[];
  const allWrong=[];

  rs.forEach(r=>{
    const ox=latestOx(student,r);
    const as=areaStats(ox,r);
    const t=scoreByTier(ox);
    M.areas.forEach(a=>{ areaAgg[a].tot+=as[a].tot; areaAgg[a].got+=as[a].got; });
    [27,34,42].forEach(k=>{ if(t[k]){tierAgg[k].q+=t[k].q; tierAgg[k].ok+=t[k].ok;} });
    scores.push({r:r,sc:scoreOf(ox).score});
    const wl=wrongList(r,ox);
    wl.forEach(w=>{ allWrong.push(w); const key=w.type||('('+w.area+')'); typeCnt[key]=(typeCnt[key]||0)+1; });
  });

  const gName=givenName(student);
  const avgScore=rs.length?Math.round(scores.reduce((a,s)=>a+s.sc,0)/rs.length*10)/10:0;
  const lv=levelLabel(avgScore);

  let h=`<div class="card">
    <h3>📊 ${esc(gName)} 누적 분석 · 응시 ${rs.length}회차</h3>`;

  /* 회차별 점수 칩 */
  h+='<div class="score-trend-grid">';
  scores.forEach(s=>{
    const l=levelLabel(s.sc);
    h+=`<div class="score-chip"><div class="sc-rnd">${esc(M.rounds[s.r].title||s.r+'회')}</div><div class="sc-val">${s.sc}</div><div style="font-size:10px;color:#6b7280">${l.icon}${l.label}</div></div>`;
  });
  h+='</div>';

  /* 평균 레벨 */
  h+=`<div class="row-inline" style="margin:8px 0">
    <span class="level-badge ${lv.cls}">${lv.icon} 평균 ${avgScore}점 → ${lv.label} 수준</span>
  </div>`;

  /* 그래프 */
  const spark=svgSparkline(student);
  if(spark) h+=spark;

  /* 단계별 누적 */
  h+='<h3 style="margin:12px 0 8px">★단계별 누적 정답률</h3>';
  h+=tierHTML(tierAgg, tierComment(tierAgg));

  /* 영역별 수행률 */
  h+='<h3 style="margin:12px 0 8px">영역별 수행률</h3>';
  M.areas.forEach(a=>{
    const s=areaAgg[a]; const pct=s.tot?Math.round(s.got/s.tot*100):0;
    h+=`<div class="area-row"><div class="at"><b>${esc(a)}</b><span>${pct}%</span></div><div class="abar"><i class="${pct>=70?'high':pct<50?'low':''}" style="width:${pct}%"></i></div></div>`;
  });

  /* 자주 틀리는 유형 TOP8 */
  const top=Object.entries(typeCnt).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(top.length){
    h+='<h3 style="margin:12px 0 8px">🔴 자주 틀리는 세부 유형</h3>';
    top.forEach(([t,c])=>{ h+=`<div class="wt-item"><div class="wt-h"><span class="no">${c}회</span>${esc(t)}</div></div>`; });
  }
  h+='</div>';

  /* 처방 교재 */
  const rxHtml=prescriptionHTML(allWrong, 6);
  if(rxHtml) h+=`<div class="card" style="padding:0;border:none;background:transparent">${rxHtml}</div>`;

  return h;
}

async function doImport(){
  const raw=document.getElementById('impcode').value.trim(); if(!raw){ return; }
  const lines=raw.split(/\s+/).filter(Boolean); let ok=0,fail=0,names=[];
  for(const code of lines){ try{ const o=JSON.parse(decodeURIComponent(escape(atob(code)))); if(o&&o.s&&o.r&&o.ox&&o.ox.length===Q()){ M.results[o.s]=M.results[o.s]||{}; M.results[o.s][o.r]=[{ox:o.ox.split(''),ts:new Date().toISOString().slice(0,10),by:'parent'}]; await supaUpsert(o.s,o.r,o.ox,'parent'); ok++; names.push(o.s+' '+(M.rounds[o.r]?M.rounds[o.r].title:o.r)); } else fail++; }catch(e){ fail++; } }
  document.getElementById('imp-res').innerHTML=`✅ ${ok}건 반영${fail?(' · ❌ '+fail+'건 실패'):''}${names.length?('<br>'+names.map(esc).join(', ')):''}`;
  toast(ok+'건 반영 완료');
}

/* ─── 회차 유형 편집 (원장) ─────────────────────────────── */
function tEdit(){
  const r=curRound; const rd=M.rounds[r];
  let h=`<div class="card">
    <div class="row-inline">
      <b>회차</b>
      <select class="select" onchange="curRound=this.value; tEdit();">${roundKeys().map(k=>`<option value="${k}" ${k===r?'selected':''}>${esc(M.rounds[k].title||k+'회')}</option>`).join('')}</select>
    </div>
    <div class="hint">세부유형·정답·오답코멘트 입력. 영역·배점은 전 회차 공통(고정). 저장 버튼 클릭 필수.</div>
    <div class="row-inline">
      <label style="font-size:12px;color:#555;width:64px">풀이영상</label>
      <input id="ed-video" value="${esc(rd.video||'')}" placeholder="유튜브 링크" style="flex:1;padding:8px;border:1px solid var(--line);border-radius:7px" oninput="M.rounds['${r}'].video=this.value; markDirty();">
    </div>`;
  for(let n=1;n<=Q();n++){
    const it=itemOf(r,n); const b=bp(n);
    h+=`<div class="ed-row"><div class="no">${n}</div>
      <input value="${esc(it.type)}" placeholder="세부유형" oninput="edSet('${r}',${n},'type',this.value)">
      <div><input value="${esc(it.answer)}" placeholder="정답" oninput="edSet('${r}',${n},'answer',this.value)" style="width:100%"><div style="font-size:12px;color:#0a7a3d;margin-top:3px;min-height:14px">${esc(it.answer)}</div></div>
      <div style="display:flex;gap:6px"><span class="area" style="min-width:74px;font-size:11px;color:#6b7280">${esc(b.area)} · ${b.pts}</span><input value="${esc(it.comment)}" placeholder="오답 코멘트(선택)" oninput="edSet('${r}',${n},'comment',this.value)" style="flex:1"></div>
    </div>`;
  }
  h+='</div>';
  document.getElementById('t-body').innerHTML=h;
}
function edSet(r,n,k,v){ const items=M.rounds[r].items=M.rounds[r].items||[]; let it=items.find(x=>x.no===n); if(!it){ it={no:n,type:'',answer:'',comment:''}; items.push(it); items.sort((a,b)=>a.no-b.no); } it[k]=v; markDirty(); }

/* ─── GitHub 저장 ────────────────────────────────────────── */
function markDirty(){ const s=document.getElementById('save-status'); if(s) s.textContent='● 변경됨 — 저장 필요'; }
function buildMockFile(){
  const out={title:M.title,areas:M.areas,roundCount:M.roundCount,questions:M.questions,blueprint:M.blueprint,rounds:M.rounds,results:{}};
  return "/* =========================================================\n * 지필드 영재교육 · 중급 모의고사 진단 데이터\n * (결과는 Supabase에 저장됩니다. 이 파일은 유형·정답·영상만)\n * 저장: "+new Date().toLocaleString('ko-KR')+"\n * ========================================================= */\nwindow.GFIELD_MOCK = "+JSON.stringify(out,null,2)+";\n";
}
function ghToken(){ let t=null; try{ t=localStorage.getItem('gfield_gh_token'); }catch(e){} if(!t){ t=prompt('GitHub 토큰 (Contents: Read and write)'); if(!t) return null; t=t.trim(); try{ localStorage.setItem('gfield_gh_token',t); }catch(e){} } return t; }
async function saveMock(){
  const token=ghToken(); if(!token) return;
  const st=document.getElementById('save-status'); st.textContent='저장 중…';
  try{
    let sha=null; const g=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}?ref=${BRANCH}`,{headers:{Authorization:'token '+token,Accept:'application/vnd.github+json'}}); if(g.ok){ sha=(await g.json()).sha; }
    const b64=btoa(unescape(encodeURIComponent(buildMockFile())));
    const p=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{method:'PUT',headers:{Authorization:'token '+token,Accept:'application/vnd.github+json'},body:JSON.stringify({message:'Update mock-data.js (types/answers)',content:b64,sha:sha,branch:BRANCH})});
    if(p.ok){ st.textContent='✅ 저장 완료 (1~2분 후 반영)'; toast('저장 완료 ✅'); }
    else{ const e=await p.json(); st.textContent='저장 실패: '+(e.message||p.status); if(p.status===401||p.status===403) toast('토큰 권한 확인'); }
  }catch(e){ st.textContent='네트워크 오류'; toast('저장 실패'); }
}
function showCode(){ const w=window.open('','_blank'); w.document.write('<pre style="white-space:pre-wrap;word-break:break-all;font-size:12px;padding:12px">'+buildMockFile().replace(/</g,'&lt;')+'</pre>'); }

/* ─── LaTeX ──────────────────────────────────────────────── */
let _mathT=null;
function typeset(){ if(!window.renderMathInElement) return; clearTimeout(_mathT); _mathT=setTimeout(function(){ try{ renderMathInElement(document.getElementById('main'),{delimiters:[{left:'$',right:'$',display:false}],throwOnError:false,ignoredClasses:['katex']}); }catch(e){} },20); }
(function(){ var m=document.getElementById('main'); if(m&&window.MutationObserver){ new MutationObserver(typeset).observe(m,{childList:true,subtree:true}); } window.addEventListener('load',typeset); })();

/* ─── URL 직접 진입 ──────────────────────────────────────── */
(function initFromUrl(){
  const p=new URLSearchParams(location.search); const rd=p.get('round');
  /* 1순위: URL name 파라미터 (index.html 로그인 상태에서 링크 타고 온 경우) */
  const urlName=(p.get('name')||'').trim();
  /* 2순위: localStorage (같은 기기 재방문) */
  let stu=urlName;
  if(!stu){ try{ stu=localStorage.getItem('gfield_student')||''; }catch(e){} }
  if(stu && stu.toLowerCase()==='docssam'){ mode='teacher'; me='원장'; try{ localStorage.setItem('gfield_student',stu); }catch(e){} startTeacher(); return; }
  if(stu && (D.students||[]).includes(stu)){
    mode='parent'; me=stu; try{ localStorage.setItem('gfield_student',stu); }catch(e){}
    startParent();
    if(rd && M.rounds[rd]) openMark(rd);
    return;
  }
  if(rd){ window._pendingRound=rd; document.getElementById('gate-err').textContent='이름을 입력하면 '+((M.rounds[rd]&&M.rounds[rd].title)||(rd+'회'))+' 진단으로 바로 들어갑니다.'; }
})();
</script>
