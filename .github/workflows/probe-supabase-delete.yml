name: Probe Supabase delete permission
on:
  push:
    paths:
      - '.github/workflows/probe-supabase-delete.yml'
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe delete on nonexistent record
        env:
          SUPA_URL: https://fgahqumaldheqettmvqg.supabase.co
          SUPA_KEY: sb_publishable_OsjJG92BLMaZrc2jTClt0g_ecdTtf_I
        run: |
          CODE=$(curl -sS -o /tmp/probe-body.txt -w '%{http_code}' -X DELETE "$SUPA_URL/rest/v1/mock_results?student=eq.__gfield_permission_probe__&round=eq.__probe__" \
            -H "apikey: $SUPA_KEY" \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H 'Prefer: return=minimal')
          echo "DELETE_HTTP=$CODE" > supabase-delete-probe.txt
          echo "BODY=$(tr '\n' ' ' </tmp/probe-body.txt | head -c 300)" >> supabase-delete-probe.txt
      - name: Commit probe result
        run: |
          rm -f .github/workflows/probe-supabase-delete.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add supabase-delete-probe.txt .github/workflows/probe-supabase-delete.yml
          git commit -m 'Supabase 차수 삭제 권한 점검'
          git push origin HEAD:${GITHUB_REF_NAME}
