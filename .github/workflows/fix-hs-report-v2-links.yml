name: Fix HS report v2 script links

on:
  push:
    paths:
      - '.github/workflows/fix-hs-report-v2-links.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Move enhancement scripts to real document tail
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def put_at_last_body(path, snippets):
              p=Path(path)
              s=p.read_text(encoding='utf-8')
              for sn in snippets:
                  s=s.replace(sn+'\n','').replace(sn,'')
              pos=s.rfind('</body>')
              if pos<0:
                  raise SystemExit(f'last </body> not found: {path}')
              block='\n'.join(snippets)+'\n'
              s=s[:pos]+block+s[pos:]
              p.write_text(s,encoding='utf-8')

          put_at_last_body('index.html',[
              '<script src="index-enhancements.js?v=20260724"></script>'
          ])
          put_at_last_body('admin.html',[
              '<script src="mock-data-hw.js?v=20260724"></script>',
              '<script src="admin-mock-v2.js?v=20260724"></script>'
          ])
          PY
      - name: Validate final placement
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for path,needle in [('index.html','index-enhancements.js'),('admin.html','admin-mock-v2.js')]:
              s=Path(path).read_text(encoding='utf-8')
              assert s.count(needle)==1, (path,s.count(needle))
              assert s.rfind(needle)<s.rfind('</body>')
              assert s.rfind(needle)>s.rfind('</script>')-300
          PY
      - name: Commit corrected links
        run: |
          rm -f .github/workflows/fix-hs-report-v2-links.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html admin.html .github/workflows/fix-hs-report-v2-links.yml
          git commit -m '학생·관리자 개선 스크립트 연결 위치 수정'
          git push origin HEAD:${GITHUB_REF_NAME}
