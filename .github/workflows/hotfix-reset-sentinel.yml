name: Hotfix reset sentinel
on:
  push:
    paths:
      - '.github/workflows/hotfix-reset-sentinel.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('mock.html')
          s=p.read_text(encoding='utf-8')
          old="""async function deleteStored(student,r,slot){
  const raw=storedKey(r,slot);
  const u=SUPA_URL+'/rest/v1/mock_results?student=eq.'+encodeURIComponent(student)+'&round=eq.'+encodeURIComponent(raw);
  const res=await fetch(u,{method:'DELETE',headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,Prefer:'return=minimal'}});
  return res.ok;
}"""
          new="""async function deleteStored(student,r,slot){
  const raw=storedKey(r,slot);
  const res=await fetch(SUPA_URL+'/rest/v1/mock_results',{method:'POST',headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates'},body:JSON.stringify({student:student,round:raw,ox:'RESET',score:0,wrong:0,source:'reset'})});
  return res.ok;
}"""
          if old not in s:
              raise SystemExit('deleteStored pattern not found')
          s=s.replace(old,new,1)
          p.write_text(s,encoding='utf-8')
          PY
          rm -f .github/workflows/hotfix-reset-sentinel.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add mock.html .github/workflows/hotfix-reset-sentinel.yml
          git commit -m '차수 초기화를 삭제 대신 재응시 가능한 표식으로 처리'
          git push origin HEAD:${GITHUB_REF_NAME}
