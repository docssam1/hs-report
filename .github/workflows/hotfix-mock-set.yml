name: Hotfix mock image set
on:
  push:
    paths:
      - '.github/workflows/hotfix-mock-set.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('mock.html')
          s=p.read_text(encoding='utf-8')
          old="function examBook(r){\n  const rx=new RegExp"
          new="function examBook(r){\n  if(SET!=='hw')return null;\n  const rx=new RegExp"
          if old not in s:
              raise SystemExit('examBook pattern not found')
          s=s.replace(old,new,1)
          p.write_text(s,encoding='utf-8')
          PY
          rm -f .github/workflows/hotfix-mock-set.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add mock.html .github/workflows/hotfix-mock-set.yml
          git commit -m '중급 화면의 활용 시험지 오연결 차단'
          git push origin HEAD:${GITHUB_REF_NAME}
