name: Apply HS report v2 links

on:
  push:
    paths:
      - '.github/workflows/apply-hs-report-v2.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Connect enhancement scripts
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def insert_before_body(path, snippet):
              p=Path(path)
              s=p.read_text(encoding='utf-8')
              if snippet.strip() in s:
                  return
              marker='</body>'
              if marker not in s:
                  raise SystemExit(f'</body> not found: {path}')
              s=s.replace(marker, snippet+'\n'+marker, 1)
              p.write_text(s,encoding='utf-8')

          insert_before_body('index.html','<script src="index-enhancements.js?v=20260724"></script>')
          insert_before_body('admin.html','<script src="mock-data-hw.js?v=20260724"></script>\n<script src="admin-mock-v2.js?v=20260724"></script>')
          PY
      - name: Validate linked files
        run: |
          test -f index-enhancements.js
          test -f admin-mock-v2.js
          grep -q 'index-enhancements.js' index.html
          grep -q 'admin-mock-v2.js' admin.html
          grep -q 'mock-data-hw.js' admin.html
      - name: Commit connected screens
        run: |
          rm -f .github/workflows/apply-hs-report-v2.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html admin.html .github/workflows/apply-hs-report-v2.yml
          git commit -m '특강 뷰어와 관리자 차수 관리 화면 연결'
          git push origin HEAD:${GITHUB_REF_NAME}
