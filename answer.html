<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>모의고사 · 답안 및 교재 연결표 | 지필드 영재교육</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Malgun Gothic','맑은 고딕',AppleGothic,-apple-system,sans-serif;color:#111;background:#eef1f6;padding:16px}.hidden{display:none!important}.gate{position:fixed;inset:0;z-index:30;background:linear-gradient(135deg,#10203f,#26447f);display:flex;align-items:center;justify-content:center;padding:20px}.gatebox{width:min(380px,100%);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(12px);padding:32px 26px;border-radius:20px;text-align:center;color:#fff}.gatebox h2{font-size:20px;margin-bottom:7px}.gatebox p{font-size:12.5px;opacity:.8;line-height:1.6}.gatebox input{width:100%;padding:13px;border:0;border-radius:10px;text-align:center;font-size:15px;margin:13px 0 9px}.gatebox button{width:100%;border:0;border-radius:10px;padding:12px;background:#EA580C;color:#fff;font-weight:800}.err{font-size:12px;color:#ffe0b8;min-height:18px;margin-top:7px}.bar{max-width:1240px;margin:0 auto 10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}.bar a{font-size:12.5px;font-weight:700;padding:8px 12px;border-radius:7px;border:1px solid #cfd6e2;background:#fff;color:#1F3864;text-decoration:none}.bar a.viewer{background:linear-gradient(135deg,#1F3864,#2a5298);color:#fff;border-color:#1F3864}.bar .sp{flex:1}.bar button{font-size:12.5px;font-weight:800;padding:8px 15px;border-radius:7px;border:1px solid #EA580C;background:#EA580C;color:#fff;cursor:pointer}.sheet{background:#fff;max-width:1240px;margin:0 auto;padding:0 0 16px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.09);overflow:hidden}.hd{display:flex;justify-content:space-between;align-items:center;background:#1F3864;color:#fff;padding:11px 16px;border-bottom:3px solid #EA580C}.hd h1{font-size:15.5px;font-weight:800}.hd .br{font-size:10px;color:#BFD3F2}.leg{display:flex;gap:13px;font-size:10.5px;color:#555;padding:7px 16px 8px;border-bottom:1px solid #eee;flex-wrap:wrap}.leg b{padding:1px 6px;border-radius:3px;font-weight:700}.t27{background:#DEEBF7}.t34{background:#FCE4D6}.t42{background:#FFD9D9}table{width:100%;border-collapse:collapse;table-layout:fixed}th{background:#1F3864;color:#fff;font-size:10px;font-weight:700;padding:5px 4px;border:1px solid #2c4a7c;text-align:left}th.c{text-align:center}td{font-size:9.6px;padding:4px;border:1px solid #E3E6EC;vertical-align:top;line-height:1.44;word-break:keep-all}td.no{text-align:center;font-weight:800;font-size:11px}td.pt{text-align:center;font-size:9px}td.ans{color:#EA580C;font-weight:700}td.rx{color:#1F3864}.b1{background:#F8FBFF}.b2{background:#F7FDF9}.b3{background:#FFFCF6}.b4{background:#FBFAFF}.b5{background:#FAFAFA}td .u{color:#6B7280}td .none{color:#C8CDD6}td ul{list-style:disc;padding-left:11px}td li{margin-bottom:1px}tr.tier td{border-top:2px solid #EA580C}.ft{padding:8px 16px 0;font-size:9.5px;color:#888;display:flex;justify-content:space-between}@page{size:A4 landscape;margin:8mm}@media print{body{background:#fff;padding:0}.bar,.gate{display:none}.sheet{box-shadow:none;max-width:none;border-radius:0}thead{display:table-header-group}tr{page-break-inside:avoid;break-inside:avoid}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}td{font-size:8.3px;padding:2.6px;line-height:1.38}th{font-size:8.6px;padding:4px 3px}.hd h1{font-size:13px}.hd{padding:8px 10px}.leg{padding:5px 10px 6px;font-size:9px}}
</style>
</head>
<body>
<div id="gate" class="gate hidden"><div class="gatebox"><h2>답안 열람 권한 확인</h2><p>승인된 학생 이름을 입력하세요.</p><input id="nameInput" placeholder="학생 이름"><button onclick="gateEnter()">확인</button><div class="err" id="gateErr"></div></div></div>
<div id="content" class="hidden">
<div class="bar" id="nav"></div>
<div class="sheet"><div class="hd"><h1 id="ttl">모의고사 · 답안 및 교재 연결표</h1><div class="br">지필드 영재교육&nbsp; G!FIELD</div></div><div class="leg"><span><b class="t27">★2.7</b> 기본 1~12번</span><span><b class="t34">★3.4</b> 중심 13~22번</span><span><b class="t42">★4.2</b> 고난도 23~30번</span><span style="color:#999">A4 가로 인쇄 기준 · 브라우저 인쇄에서 '배경 그래픽' 켜기</span></div><table><colgroup><col style="width:2.6%"><col style="width:3.2%"><col style="width:8.6%"><col style="width:12%"><col style="width:8.6%"><col style="width:12.3%"><col style="width:13.5%"><col style="width:11.3%"><col style="width:11.3%"><col style="width:16.6%"></colgroup><thead><tr><th class="c">번호</th><th class="c">배점</th><th>정답</th><th>세부유형</th><th>처방유형</th><th>📗 시중교재</th><th>🔵 소마(프리미어)</th><th>📙 필즈더클래식</th><th>🟣 지필드</th><th>📌 추가 학습 포인트</th></tr></thead><tbody id="body"></tbody></table><div class="ft"><span id="ft1"></span><span>30문항 · 100점 만점</span></div></div>
</div>
<script>document.write('<script src="data.js?v='+Date.now()+'"><\/script>');</script>
<script>(function(){var v=Date.now();['mock-data.js','mock-data-hw.js','mock-rx.js'].forEach(function(f){document.write('<scr'+'ipt src="'+f+'?v='+v+'"><\/scr'+'ipt>')})})();</script>
<script>
const P=new URLSearchParams(location.search),SET=((P.get('set')||'').toLowerCase()==='hw')?'hw':'mid',SETNAME=SET==='hw'?'활용':'중급';
const D=window.GFIELD_DATA||{},M=SET==='hw'?(window.GFIELD_MOCK_HW||{}):(window.GFIELD_MOCK||window.MOCK||{}),MAXR=SET==='hw'?9:8,RD=(()=>{const n=parseInt(P.get('round'),10);return n>=1&&n<=MAXR?n:1})(),RX=typeof PRESCRIPTION!=='undefined'?PRESCRIPTION:(window.PRESCRIPTION||[]);
let NAME=(P.get('name')||'').trim();try{if(!NAME)NAME=localStorage.getItem('gfield_student')||''}catch(e){}
function allowed(name){
  if(name.toLowerCase()==='docssam')return true;
  if(!(D.students||[]).includes(name))return false;
  if(SET!=='hw')return true;
  const online=((D.studentTypes||{})[name])==='online';
  if(online&&((((D.archiveAccess||{})['활용 모의고사'])||[]).includes(name)))return true;
  if(online)return false;
  if(!((D.specialStudents||[]).includes(name)))return false;
  const tbs=(((D.content||{})['special-summer']||{}).textbooks)||[];
  return tbs.some(t=>{const m=String(t.title||'').match(/활용\s*모의고사\s*(\d+)\s*회/);return m&&+m[1]===RD&&Array.isArray(t.access)&&t.access.includes(name)});
}
function gateEnter(){const v=document.getElementById('nameInput').value.trim();if(!allowed(v)){document.getElementById('gateErr').textContent='이 회차의 답안 열람 권한이 없습니다.';return}NAME=v;try{localStorage.setItem('gfield_student',v)}catch(e){}showContent()}
function latexToPlain(s){return(s||'').replace(/\$(.*?)\$/g,function(m,x){var t=x.replace(/\\d?frac\s*\{([^{}]*)\}\s*\{([^{}]*)\}/g,function(_,a,b){return' '+a+'/'+b});return t.replace(/[{}]/g,'').replace(/\s+/g,' ').trim()})}
function esc(s){return String(s==null||s===''?'—':latexToPlain(String(s))).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])).replace(/−/g,'-')}
function findRx(t){let best=null,bl=0;if(!t)return null;for(const r of RX)for(const k of r.kw)if(k&&t.includes(k)&&k.length>bl){best=r;bl=k.length}return best}
function bk(list){if(!list||!list.length)return'<span class="none">—</span>';return list.map(b=>`<b>${esc(b.b)}</b> <span class="u">${esc(b.u)}</span>`).join('<br>')}
function showContent(){
  document.getElementById('gate').classList.add('hidden');document.getElementById('content').classList.remove('hidden');
  const viewer='mock.html?set='+SET+'&round='+RD+'&name='+encodeURIComponent(NAME)+(P.get('preview')==='1'?'&preview=1':'');
  document.getElementById('nav').innerHTML='<a href="'+viewer+'" class="viewer">📝 시험지 뷰어 · 오답 입력·분석</a><span class="sp"></span><button onclick="window.print()">🖨 인쇄 / PDF 저장</button>';
  document.title=`${SETNAME} 모의고사 · 답안 및 교재 연결표 | 지필드 영재교육`;document.getElementById('ttl').textContent=`${SETNAME} 모의고사 ${RD}회 · 답안 및 교재 연결표`;document.getElementById('ft1').textContent=`지필드 영재교육 · ${SETNAME} 모의고사 ${RD}회 답안 및 교재 연결표`;
  const items=(((M.rounds||{})[RD]||(M.rounds||{})[String(RD)]||{}).items)||[];document.getElementById('body').innerHTML=items.map(it=>{const no=it.no,pt=no<=12?'2.7':no<=22?'3.4':'4.2',cls=no<=12?'t27':no<=22?'t34':'t42',tr=no===13||no===23?' class="tier"':'',r=findRx(it.type)||{books:{},pts:[],label:'—'},B=r.books||{},pts=(r.pts||[]).map(p=>`<li>${esc(p)}</li>`).join('');return`<tr${tr}><td class="no">${no}</td><td class="pt ${cls}">${pt}</td><td class="ans">${esc(it.answer)}</td><td>${esc(it.type)}</td><td class="rx">${esc(r.label)}</td><td class="b1">${bk(B['시중교재'])}</td><td class="b2">${bk(B['소마'])}</td><td class="b3">${bk(B['필즈더클래식'])}</td><td class="b4">${bk(B['지필드'])}</td><td class="b5"><ul>${pts}</ul></td></tr>`}).join('');if(!items.length)document.getElementById('body').innerHTML='<tr><td colspan="10" style="padding:24px;text-align:center;color:#888">데이터를 불러오지 못했습니다.</td></tr>';
}
if(allowed(NAME))showContent();else{document.getElementById('gate').classList.remove('hidden');document.getElementById('nameInput').value=NAME;document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')gateEnter()})}
</script>
</body></html>
