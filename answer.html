<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>중급 모의고사 · 답안 및 교재 연결표 | 지필드 영재교육</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','맑은 고딕',AppleGothic,-apple-system,sans-serif;color:#111;background:#eef1f6;padding:16px}
.bar{max-width:1240px;margin:0 auto 10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.bar a{font-size:12.5px;font-weight:700;padding:7px 12px;border-radius:7px;border:1px solid #cfd6e2;background:#fff;color:#1F3864;text-decoration:none}
.bar a.on{background:#1F3864;color:#fff;border-color:#1F3864}
.bar .sp{flex:1}
.bar button{font-size:12.5px;font-weight:800;padding:8px 15px;border-radius:7px;border:1px solid #EA580C;background:#EA580C;color:#fff;cursor:pointer}
.sheet{background:#fff;max-width:1240px;margin:0 auto;padding:0 0 16px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.09);overflow:hidden}
.hd{display:flex;justify-content:space-between;align-items:center;background:#1F3864;color:#fff;padding:11px 16px;border-bottom:3px solid #EA580C}
.hd h1{font-size:15.5px;font-weight:800;letter-spacing:-.2px}
.hd .br{font-size:10px;color:#BFD3F2;letter-spacing:.5px}
.leg{display:flex;gap:13px;font-size:10.5px;color:#555;padding:7px 16px 8px;border-bottom:1px solid #eee;flex-wrap:wrap}
.leg b{padding:1px 6px;border-radius:3px;font-weight:700}
.t27{background:#DEEBF7}.t34{background:#FCE4D6}.t42{background:#FFD9D9}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{background:#1F3864;color:#fff;font-size:10px;font-weight:700;padding:5px 4px;border:1px solid #2c4a7c;text-align:left}
th.c{text-align:center}
td{font-size:9.6px;padding:4px;border:1px solid #E3E6EC;vertical-align:top;line-height:1.44;word-break:keep-all}
td.no{text-align:center;font-weight:800;font-size:11px}
td.pt{text-align:center;font-size:9px}
td.ans{color:#EA580C;font-weight:700}
td.rx{color:#1F3864}
.b1{background:#F8FBFF}.b2{background:#F7FDF9}.b3{background:#FFFCF6}.b4{background:#FBFAFF}.b5{background:#FAFAFA}
td .u{color:#6B7280}
td .none{color:#C8CDD6}
td ul{list-style:disc;padding-left:11px}
td li{margin-bottom:1px}
tr.tier td{border-top:2px solid #EA580C}
.ft{padding:8px 16px 0;font-size:9.5px;color:#888;display:flex;justify-content:space-between}
@page{size:A4 landscape;margin:8mm}
@media print{
  body{background:#fff;padding:0}
  .bar{display:none}
  .sheet{box-shadow:none;max-width:none;border-radius:0}
  thead{display:table-header-group}
  tr{page-break-inside:avoid;break-inside:avoid}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  td{font-size:8.3px;padding:2.6px;line-height:1.38}
  th{font-size:8.6px;padding:4px 3px}
  .hd h1{font-size:13px} .hd{padding:8px 10px}
  .leg{padding:5px 10px 6px;font-size:9px}
}
</style>
</head>
<body>
<div class="bar" id="nav"></div>
<div class="sheet">
  <div class="hd"><h1 id="ttl">중급 모의고사 · 답안 및 교재 연결표</h1><div class="br">지필드 영재교육&nbsp; G!FIELD</div></div>
  <div class="leg">
    <span><b class="t27">★2.7</b> 기본 1~12번</span>
    <span><b class="t34">★3.4</b> 중심 13~22번</span>
    <span><b class="t42">★4.2</b> 고난도 23~30번</span>
    <span style="color:#999">A4 가로 인쇄 기준 · 브라우저 인쇄에서 '배경 그래픽' 켜기</span>
  </div>
  <table>
    <colgroup>
      <col style="width:2.6%"><col style="width:3.2%"><col style="width:8.6%"><col style="width:12%"><col style="width:8.6%">
      <col style="width:12.3%"><col style="width:13.5%"><col style="width:11.3%"><col style="width:11.3%"><col style="width:16.6%">
    </colgroup>
    <thead><tr>
      <th class="c">번호</th><th class="c">배점</th><th>정답</th><th>세부유형</th><th>처방유형</th>
      <th>📗 시중교재</th><th>🔵 소마(프리미어)</th><th>📙 필즈더클래식</th><th>🟣 지필드</th><th>📌 추가 학습 포인트</th>
    </tr></thead>
    <tbody id="body"></tbody>
  </table>
  <div class="ft"><span id="ft1"></span><span>30문항 · 100점 만점</span></div>
</div>

<script src="mock-data.js"></script>
<script src="mock-rx.js"></script>
<script>
const RD = (()=>{ const r=new URLSearchParams(location.search).get('round'); const n=parseInt(r,10); return (n>=1&&n<=8)?n:1; })();
const M = window.GFIELD_MOCK || window.MOCK || {};
/* $32\frac{8}{11}$ → 32 8/11 (mock.html의 latexToPlain과 동일) */
function latexToPlain(s){ return (s||'').replace(/\$(.*?)\$/g, function(m,x){
  var t=x.replace(/\\d?frac\s*\{([^{}]*)\}\s*\{([^{}]*)\}/g, function(_,a,b){ return ' '+a+'/'+b; });
  return t.replace(/[{}]/g,'').replace(/\s+/g,' ').trim(); }); }
function esc(s){ return String(s==null||s===''?'—':latexToPlain(String(s))).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])).replace(/−/g,'-'); }
/* mock-rx.js는 `const PRESCRIPTION`으로 선언 — const는 window에 붙지 않으므로
   window.PRESCRIPTION이 아니라 전역 렉시컬 스코프에서 직접 참조해야 함 */
const RX = (typeof PRESCRIPTION !== 'undefined') ? PRESCRIPTION
         : (window.PRESCRIPTION || []);
function findRx(t){ let best=null,bl=0; if(!t) return null;
  for(const r of RX) for(const k of r.kw)
    if(k && t.includes(k) && k.length>bl){ best=r; bl=k.length; }
  return best; }
function bk(list){ if(!list||!list.length) return '<span class="none">—</span>';
  return list.map(b=>`<b>${esc(b.b)}</b> <span class="u">${esc(b.u)}</span>`).join('<br>'); }

const rounds = (M.rounds)||{};
/* 회차 이동 버튼 없음 — 링크로 받은 회차만 열립니다 (다른 회차 답안 노출 방지) */
document.getElementById('nav').innerHTML =
  '<span class="sp"></span><button onclick="window.print()">🖨 인쇄 / PDF 저장</button>';
document.getElementById('ttl').textContent = `중급 모의고사 ${RD}회  ·  답안 및 교재 연결표`;
document.getElementById('ft1').textContent = `지필드 영재교육 · 중급 모의고사 ${RD}회 답안 및 교재 연결표`;

const items = ((rounds[RD]||rounds[String(RD)]||{}).items)||[];
document.getElementById('body').innerHTML = items.map(it=>{
  const no=it.no;
  const pt = no<=12?'2.7' : (no<=22?'3.4':'4.2');
  const cls= no<=12?'t27' : (no<=22?'t34':'t42');
  const tr = (no===13||no===23)?' class="tier"':'';
  const r  = findRx(it.type)||{books:{},pts:[],label:'—'};
  const B  = r.books||{};
  const pts= (r.pts||[]).map(p=>`<li>${esc(p)}</li>`).join('');
  return `<tr${tr}>
  <td class="no">${no}</td><td class="pt ${cls}">${pt}</td>
  <td class="ans">${esc(it.answer)}</td><td>${esc(it.type)}</td><td class="rx">${esc(r.label)}</td>
  <td class="b1">${bk(B['시중교재'])}</td><td class="b2">${bk(B['소마'])}</td>
  <td class="b3">${bk(B['필즈더클래식'])}</td><td class="b4">${bk(B['지필드'])}</td>
  <td class="b5"><ul>${pts}</ul></td></tr>`;
}).join('');
if(!items.length) document.getElementById('body').innerHTML =
  '<tr><td colspan="10" style="padding:24px;text-align:center;color:#888">데이터를 불러오지 못했습니다.</td></tr>';
</script>
</body></html>
